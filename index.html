<!DOCTYPE html><html lang="es"><head>
    <meta charset="UTF-8">
    <meta name="theme-color" content="#FF8C00">
    <link rel="manifest" href="./manifest.json">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    
    <title>Pizarra Digital Pro+ | Edición Docente | Gratis e Ilimitada</title>
    <meta name="description" content="Pizarra digital profesional y online. Incluye visor web, herramientas de dibujo, exportación en PDF e imagen. Disfruta de la versión PRO totalmente gratis y potencia tus clases virtuales sin límites de escritura.">
    <meta name="keywords" content="pizarra digital, pizarra virtual, pizarra online, pizarra interactiva, dar clases online, herramientas docentes, pizarra para profesores, versión gratis, software educativo, pizarra digital pro">
    <meta name="robots" content="index, follow">
    <script src="https://cdn.tailwindcss.com">
    </script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/fabric.js/5.3.0/fabric.min.js">
    </script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js">
    </script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,400;0,600;0,700;1,400&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/screenfull@5.2.0/dist/screenfull.min.js">
    </script>
    <script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>

    <!-- ========================================== -->
    <!-- CAPA 1: ESTILOS CSS - DISEÑO Y COMPONENTES -->
    <!-- ========================================== -->
    <style>
        :root {
            --bg-primary: #0A1420;
            --bg-surface: #1A2436;
            --accent: #FF8C00;
            --text-primary: #FFFFFF;
            --text-secondary: #8A9BAE;
            --border-color: #2a3a4e;
        }
        * { scrollbar-width: thin; scrollbar-color: var(--accent) var(--bg-surface); }
        *::-webkit-scrollbar { width: 8px; height: 8px; }
        *::-webkit-scrollbar-track { background: var(--bg-surface); border-radius: 4px; }
        *::-webkit-scrollbar-thumb { background: var(--accent); border-radius: 4px; }
        body { background-color: var(--bg-primary); color: var(--text-primary); }
        
        [data-tooltip] { position: relative; }
        [data-tooltip]:before {
            content: attr(data-tooltip); position: absolute; bottom: 100%; left: 50%; transform: translateX(-50%);
            background: var(--bg-surface); color: var(--text-primary); padding: 6px 10px; border-radius: 8px; font-size: 12px;
            white-space: nowrap; opacity: 0; pointer-events: none; transition: opacity 0.2s; z-index: 100;
            margin-bottom: 8px; font-weight: 500; box-shadow: 0 4px 6px rgba(0,0,0,0.3); border: 1px solid var(--border-color);
        }
        [data-tooltip]:hover:before { opacity: 1; }
        
        .tool-active { 
            background-color: var(--accent) !important; 
            color: #0A1420 !important; 
            border-color: var(--accent) !important;
            box-shadow: 0 0 10px rgba(255, 140, 0, 0.4);
        }
        
        .quick-tool-horizontal {
            display: inline-flex; align-items: center; justify-content: center; width: 40px; height: 40px;
            border-radius: 10px; background-color: var(--bg-surface); color: var(--text-secondary);
            transition: all 0.2s; border: 1px solid var(--border-color); outline: none;
        }
        .quick-tool-horizontal:hover { background-color: var(--accent); color: #0A1420; transform: translateY(-1px); }
        #canvas-container { background-color: #F8F9FA; outline: none; }
        #canvas-container::-webkit-scrollbar { width: 8px; height: 8px; }
        #canvas-container::-webkit-scrollbar-thumb { background-color: var(--accent); border-radius: 4px; }
        .pages-scrollbar::-webkit-scrollbar { height: 4px; }
        .pages-scrollbar::-webkit-scrollbar-thumb { background-color: var(--accent); border-radius: 4px; }
        .page-tab { transition: all 0.2s; white-space: nowrap; background-color: var(--bg-surface); color: var(--text-secondary); border: 1px solid var(--border-color); outline: none;}
        .page-tab.active { background-color: var(--accent); color: #0A1420; border-color: var(--accent); font-weight: bold;}
        .resize-handle { width: 6px; cursor: ew-resize; background-color: var(--border-color); transition: background-color 0.2s; }
        .resize-handle:hover { background-color: var(--accent); }
        .floating-toolbar { background-color: rgba(26, 36, 54, 0.95); backdrop-filter: blur(8px); border: 1px solid var(--border-color); box-shadow: 0 10px 25px -5px rgba(0,0,0,0.5); }
        input, select, button { background-color: var(--bg-surface); color: var(--text-primary); border-color: var(--border-color); outline: none; }
        input:focus, select:focus { outline: none; border-color: var(--accent); }
        
        .scroller-hidden { scrollbar-width: none; }
        .scroller-hidden::-webkit-scrollbar { display: none; }

        /* CAPA 1.1: ESTILOS BARRA FLOTANTE - DRAG Y MINIMIZAR */
        #floating-toolbar {
            transition: left 0.05s ease-out, top 0.05s ease-out, opacity 0.3s ease;
            user-select: none;
        }
        #floating-toolbar.dragging {
            transition: none !important;
            opacity: 0.9;
            cursor: grabbing;
        }
        #toolbar-drag-handle {
            cursor: grab;
            font-size: 18px;
            letter-spacing: -2px;
            line-height: 1;
        }
        #toolbar-drag-handle:active {
            cursor: grabbing;
        }
        /* botón flotante minimizado */
        #mini-toolbar-btn {
            transition: transform 0.2s ease, opacity 0.3s ease;
            z-index: 50;
        }
        #mini-toolbar-btn:hover {
            transform: scale(1.15);
        }
        /* animación de pulso suave cuando está minimizado */
        @keyframes softPulse {
            0%, 100% { box-shadow: 0 0 0 0 rgba(255, 140, 0, 0.6); }
            50% { box-shadow: 0 0 0 12px rgba(255, 140, 0, 0); }
        }
        .mini-pulse {
            animation: softPulse 2.5s infinite;
        }
        /* Asegurar que los dropdowns dentro de la barra flotante no queden ocultos */
        .toolbar-scroll-area {
            overflow: visible;
        }
    </style>
</head>
<body class="bg-[#0A1420] h-screen flex flex-col overflow-hidden font-sans">

    <input type="file" id="main-file-input" class="hidden" accept="*/*">

    <!-- ========================================== -->
    <!-- CAPA 2: BARRA SUPERIOR REDUCIDA (solo compartir y pantalla completa) -->
    <!-- ========================================== -->
    <div class="bg-[#1A2436] shadow-lg border-b border-[#2a3a4e] px-4 py-1.5 flex items-center justify-end z-30 relative gap-2">
        <button id="share-btn" class="px-3 py-2 text-xs bg-blue-900 text-blue-100 border border-blue-800 rounded-lg hover:bg-blue-700 transition flex items-center gap-2" data-tooltip="Compartir Sala"><i class="fas fa-share-alt"></i> <span class="hidden sm:inline">Compartir</span></button>
        <button id="fullscreen-btn" class="w-10 h-10 flex items-center justify-center text-gray-300 hover:text-white bg-[#0A1420] border border-[#2a3a4e] rounded-lg transition" data-tooltip="Pantalla Completa"><i class="fas fa-expand"></i></button>
    </div>

    <!-- ========================================== -->
    <!-- CAPA 3: ÁREA PRINCIPAL - LIENZO Y VISORES -->
    <!-- ========================================== -->
    <div class="flex flex-1 overflow-hidden relative" id="main-area">
        <div id="canvas-container" class="flex-1 overflow-auto outline-none relative" tabindex="0">
            <div id="context-menu" class="hidden absolute bg-[#1A2436] border border-[#2a3a4e] p-1.5 rounded-lg shadow-xl flex gap-1 z-50 transition-opacity items-center">
                <button id="ctx-copy" class="w-8 h-8 flex items-center justify-center text-white hover:bg-[#FF8C00] hover:text-black rounded transition" data-tooltip="Copiar (Ctrl+C)"><i class="fas fa-copy"></i></button>
                <button id="ctx-paste" class="w-8 h-8 flex items-center justify-center text-white hover:bg-[#FF8C00] hover:text-black rounded transition" data-tooltip="Duplicar"><i class="fas fa-paste"></i></button>
                <button id="ctx-cut" class="w-8 h-8 flex items-center justify-center text-white hover:bg-[#FF8C00] hover:text-black rounded transition" data-tooltip="Cortar (Ctrl+X)"><i class="fas fa-cut"></i></button>
                <button id="ctx-delete" class="w-8 h-8 flex items-center justify-center text-red-400 hover:bg-red-600 hover:text-white rounded transition" data-tooltip="Borrar (Supr)"><i class="fas fa-trash"></i></button>
                <div id="ctx-sep" class="w-px h-6 bg-[#2a3a4e] mx-0.5"></div>
                <button id="ctx-group" class="w-8 h-8 flex items-center justify-center text-white hover:bg-[#FF8C00] hover:text-black rounded transition" data-tooltip="Agrupar"><i class="fas fa-object-group"></i></button>
                <button id="ctx-ungroup" class="w-8 h-8 flex items-center justify-center text-white hover:bg-[#FF8C00] hover:text-black rounded transition" data-tooltip="Desagrupar"><i class="fas fa-object-ungroup"></i></button>
                <button id="ctx-add-text" class="w-8 h-8 flex items-center justify-center text-white hover:bg-[#FF8C00] hover:text-black rounded transition" data-tooltip="Añadir Texto"><i class="fas fa-font"></i></button>
                
                <div id="ctx-shape-sep" class="w-px h-6 bg-[#2a3a4e] mx-0.5 hidden"></div>
                <label id="ctx-fill-label" class="hidden items-center gap-1 text-white text-xs cursor-pointer hover:text-[#FF8C00] transition px-1" data-tooltip="Rellenar">
                    <input type="checkbox" id="ctx-fill-cb" class="cursor-pointer">
                    <i class="fas fa-paint-brush"></i>
                </label>
            </div>

            <canvas id="canvas" width="8000" height="6000" style="width:8000px; height:6000px;"></canvas>
        </div>
        
        <div id="resize-handle" class="resize-handle w-1.5 bg-[#2a3a4e] hover:bg-[#FF8C00] transition-all cursor-ew-resize"></div>
        
        <div id="doc-viewer" class="bg-[#1A2436] border-l border-[#2a3a4e] shadow-xl z-20 flex flex-col hidden" style="width: 400px; min-width: 280px; max-width: 80vw;">
            <div class="flex justify-between items-center p-4 border-b border-[#2a3a4e] bg-[#0A1420]">
                <h3 class="font-semibold text-white"><i class="fas fa-file-alt mr-2 text-[#FF8C00]"></i>Visor de Archivo</h3>
                <button id="close-viewer" class="text-gray-400 hover:text-white px-2"><i class="fas fa-times"></i></button>
            </div>
            <div id="viewer-content" class="flex-1 overflow-auto p-2 bg-[#0A1420] flex items-center justify-center"></div>
        </div>

        <div id="web-viewer" class="bg-[#1A2436] border-l border-[#2a3a4e] shadow-xl z-20 flex flex-col hidden" style="width: 500px; min-width: 320px; max-width: 85vw;">
            <div class="flex flex-col border-b border-[#2a3a4e] bg-[#0A1420]">
                <div class="flex justify-between items-center p-3 border-b border-[#2a3a4e]">
                    <h3 class="font-semibold text-white"><i class="fab fa-google mr-2 text-[#FF8C00]"></i>Navegador Web</h3>
                    <button id="close-web-viewer" class="text-gray-400 hover:text-white px-2"><i class="fas fa-times"></i></button>
                </div>
                <div class="flex gap-2 p-2 bg-[#1A2436]">
                    <input type="text" id="web-url-input" class="flex-1 bg-[#0A1420] text-white px-3 py-1.5 rounded-lg border border-[#2a3a4e] text-sm" placeholder="Buscar en Google o ingresar URL...">
                    <button id="web-go-btn" class="bg-[#FF8C00] text-black px-4 py-1.5 rounded-lg hover:bg-[#e07e00] transition font-bold"><i class="fas fa-search"></i></button>
                </div>
            </div>
            <div class="flex-1 overflow-hidden relative">
                <iframe id="web-iframe" src="https://www.google.com/webhp?igu=1" style="width:100%; height:100%; border:none; background-color: white;" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"></iframe>
            </div>
        </div>

        <!-- ========================================== -->
        <!-- CAPA 3.1: BARRA FLOTANTE - HERRAMIENTAS INTEGRADAS (DRAGGABLE Y MINIMIZABLE) -->
        <!-- ========================================== -->
        <div id="floating-toolbar" class="floating-toolbar absolute flex items-center gap-2 p-2 rounded-2xl z-40 justify-center w-max max-w-[95vw]" style="bottom: 5rem; left: 50%; transform: translateX(-50%); overflow: visible;">
            <!-- Área con desplazamiento horizontal para todos los controles -->
            <div class="toolbar-scroll-area flex items-center gap-2 flex-shrink-0" style="max-width: 100%;">
                <!-- Handle de arrastre -->
                <span id="toolbar-drag-handle" class="cursor-grab px-1 text-gray-500 hover:text-white select-none text-lg leading-none flex-shrink-0" title="Arrastrar para mover la barra">⋮⋮</span>
                
                <!-- ========================================== -->
                <!-- SECCIÓN: HERRAMIENTAS RÁPIDAS BÁSICAS -->
                <!-- ========================================== -->
                <button id="select-btn-float" class="quick-tool-horizontal" data-tooltip="Seleccionar (V)"><i class="fas fa-mouse-pointer"></i></button>
                <button id="pan-btn-float" class="quick-tool-horizontal" data-tooltip="Mover Pizarra"><i class="far fa-hand-paper"></i></button>
                <div class="w-px h-6 bg-[#2a3a4e] mx-1 min-w-[1px]"></div>

                <!-- ========================================== -->
                <!-- SECCIÓN: LÁPIZ CON COLOR Y GROSOR INTEGRADO -->
                <!-- ========================================== -->
                <div class="relative">
                    <button id="draw-btn-float" class="quick-tool-horizontal text-[#FF8C00]" style="border-color: #FF8C00;" data-tooltip="Lápiz (P)"><i class="fas fa-pencil-alt"></i></button>
                    <div id="drop-lapiz" class="hidden absolute bottom-full mb-2 left-0 bg-[#0A1420] border border-[#2a3a4e] p-3 rounded-xl shadow-2xl flex flex-col gap-3 z-50 w-max">
                        <div class="flex items-center gap-2 border-b border-[#2a3a4e] pb-2">
                            <span class="text-xs text-gray-400 font-semibold">Grosor:</span>
                            <input type="number" id="brush-size-num" min="1" max="50" value="3" class="w-12 text-center border border-[#2a3a4e] rounded-md text-xs bg-[#1A2436] text-white py-1">
                            <input type="color" id="brush-color" value="#000000" class="w-7 h-7 rounded-md cursor-pointer border-0 p-0 ml-1">
                        </div>
                        <div class="flex gap-1.5 justify-center">
                            <button data-color="#FFFFFF" class="color-quick w-6 h-6 rounded-full bg-white border border-[#2a3a4e] hover:scale-110 transition shadow-sm"></button>
                            <button data-color="#000000" class="color-quick w-6 h-6 rounded-full bg-black border border-[#2a3a4e] hover:scale-110 transition shadow-sm"></button>
                            <button data-color="#1e3a8a" class="color-quick w-6 h-6 rounded-full bg-blue-900 border border-[#2a3a4e] hover:scale-110 transition shadow-sm"></button>
                            <button data-color="#15803d" class="color-quick w-6 h-6 rounded-full bg-green-700 border border-[#2a3a4e] hover:scale-110 transition shadow-sm"></button>
                            <button data-color="#b91c1c" class="color-quick w-6 h-6 rounded-full bg-red-700 border border-[#2a3a4e] hover:scale-110 transition shadow-sm"></button>
                            <button data-color="#eab308" class="color-quick w-6 h-6 rounded-full bg-yellow-500 border border-[#2a3a4e] hover:scale-110 transition shadow-sm"></button>
                            <button data-color="#f97316" class="color-quick w-6 h-6 rounded-full bg-orange-500 border border-[#2a3a4e] hover:scale-110 transition shadow-sm"></button>
                        </div>
                    </div>
                </div>

                <!-- ========================================== -->
                <!-- SECCIÓN: RESALTADOR CON COLOR INTEGRADO -->
                <!-- ========================================== -->
                <div class="relative">
                    <button id="highlighter-btn-float" class="quick-tool-horizontal text-[#FF8C00]" style="border-color: #FF8C00;" data-tooltip="Resaltador (H)"><i class="fas fa-highlighter"></i></button>
                    <div id="drop-resaltador" class="hidden absolute bottom-full mb-2 left-0 bg-[#0A1420] border border-[#2a3a4e] p-3 rounded-xl shadow-2xl flex flex-col gap-3 z-50 w-max">
                        <div class="flex items-center gap-2 border-b border-[#2a3a4e] pb-2">
                            <span class="text-xs text-gray-400 font-semibold">Grosor:</span>
                            <input type="number" id="highlighter-size-num" min="10" max="100" value="25" class="w-12 text-center border border-[#2a3a4e] rounded-md text-xs bg-[#1A2436] text-white py-1">
                        </div>
                        <div class="flex gap-2 justify-center">
                            <button data-hcolor="rgba(255, 235, 59, 0.4)" class="h-color-quick w-7 h-7 rounded-md bg-yellow-400 border border-[#2a3a4e] hover:scale-110 transition shadow-sm"></button>
                            <button data-hcolor="rgba(76, 175, 80, 0.4)" class="h-color-quick w-7 h-7 rounded-md bg-green-400 border border-[#2a3a4e] hover:scale-110 transition shadow-sm"></button>
                            <button data-hcolor="rgba(33, 150, 243, 0.4)" class="h-color-quick w-7 h-7 rounded-md bg-blue-400 border border-[#2a3a4e] hover:scale-110 transition shadow-sm"></button>
                            <button data-hcolor="rgba(233, 30, 99, 0.4)" class="h-color-quick w-7 h-7 rounded-md bg-pink-500 border border-[#2a3a4e] hover:scale-110 transition shadow-sm"></button>
                        </div>
                    </div>
                </div>
                <button id="eraser-btn-float" class="quick-tool-horizontal" data-tooltip="Borrador (E)"><i class="fas fa-eraser"></i></button>
                <div class="w-px h-6 bg-[#2a3a4e] mx-1 min-w-[1px]"></div>

                <!-- ========================================== -->
                <!-- SECCIÓN: TEXTO Y NOTA RÁPIDA + FUENTE -->
                <!-- ========================================== -->
                <button id="text-btn-float" class="quick-tool-horizontal" data-tooltip="Texto (T)"><i class="fas fa-font"></i></button>
                <button id="sticky-btn-float" class="quick-tool-horizontal" data-tooltip="Nota Rápida"><i class="far fa-sticky-note"></i></button>
                <div class="relative">
                    <button id="toggle-fuente" class="w-10 h-10 flex items-center justify-center bg-[#0A1420] rounded-lg border border-[#2a3a4e] hover:bg-[#FF8C00] hover:text-[#0A1420] text-[#FF8C00] transition" data-tooltip="Editor de Texto">
                        <i class="fas fa-text-height"></i>
                    </button>
                    <div id="drop-fuente" class="hidden absolute bottom-full mb-2 left-0 bg-[#0A1420] border border-[#2a3a4e] p-3 rounded-xl shadow-2xl flex flex-col gap-3 z-50 w-max">
                        <div class="flex items-center gap-2 border-b border-[#2a3a4e] pb-2">
                            <select id="font-family-select" class="text-xs border border-[#2a3a4e] rounded-md bg-[#1A2436] text-white py-1.5 px-2 w-32 outline-none focus:border-[#FF8C00]">
                                <option value="Arial">Arial</option>
                                <option value="Arial Narrow">Arial Narrow</option>
                                <option value="Poppins">Poppins</option>
                                <option value="Bahnschrift">Bahnschrift SemiBold</option>
                                <option value="Calibri">Calibri</option>
                                <option value="Courier New">Courier New</option>
                                <option value="Georgia">Georgia</option>
                            </select>
                            <select id="font-size-select" class="text-xs border border-[#2a3a4e] rounded-md bg-[#1A2436] text-white py-1.5 px-2 outline-none focus:border-[#FF8C00]">
                                <option value="16" selected>16px</option>
                                <option value="20">20px</option>
                                <option value="24">24px</option>
                                <option value="36">36px</option>
                                <option value="48">48px</option>
                                <option value="64">64px</option>
                            </select>
                        </div>
                        <div class="flex items-center gap-2 justify-center bg-[#1A2436] p-1.5 rounded-lg border border-[#2a3a4e]">
                            <button id="text-bold-btn" class="w-8 h-8 flex items-center justify-center text-gray-300 hover:bg-[#0A1420] hover:text-white rounded text-sm transition" data-tooltip="Negrita"><i class="fas fa-bold"></i></button>
                            <button id="text-italic-btn" class="w-8 h-8 flex items-center justify-center text-gray-300 hover:bg-[#0A1420] hover:text-white rounded text-sm transition" data-tooltip="Cursiva"><i class="fas fa-italic"></i></button>
                            <button id="text-case-btn" class="w-8 h-8 flex items-center justify-center text-gray-300 hover:bg-[#0A1420] hover:text-white rounded text-sm font-bold transition" data-tooltip="Mayús/Minús">Aa</button>
                            <div class="w-px h-5 bg-[#2a3a4e] mx-1"></div>
                            <div class="flex items-center gap-1" data-tooltip="Color Texto">
                                <i class="fas fa-palette text-gray-500 text-[10px]"></i>
                                <input type="color" id="text-color-btn" value="#000000" class="w-6 h-6 rounded cursor-pointer border-0 p-0">
                            </div>
                            <div class="flex items-center gap-1" data-tooltip="Color Fondo">
                                <i class="fas fa-fill-drip text-gray-500 text-[10px]"></i>
                                <input type="color" id="text-bg-btn" value="#000000" class="w-6 h-6 rounded cursor-pointer border-0 p-0">
                            </div>
                        </div>
                    </div>
                </div>
                <div class="w-px h-6 bg-[#2a3a4e] mx-1 min-w-[1px]"></div>

                <!-- ========================================== -->
                <!-- SECCIÓN: FORMAS (LÍNEAS, 2D, 3D) -->
                <!-- ========================================== -->
                <button id="panel-lines-btn" class="quick-tool-horizontal text-[#FF8C00]" style="border-color: #FF8C00;" data-tooltip="Líneas y Flechas"><i class="fas fa-wave-square"></i></button>
                <button id="panel-shapes2d-btn" class="quick-tool-horizontal text-[#FF8C00]" style="border-color: #FF8C00;" data-tooltip="Geometría 2D"><i class="fas fa-shapes"></i></button>
                <button id="panel-shapes3d-btn" class="quick-tool-horizontal text-[#FF8C00]" style="border-color: #FF8C00;" data-tooltip="Figuras 3D"><i class="fas fa-cube"></i></button>
                <div class="w-px h-6 bg-[#2a3a4e] mx-1 min-w-[1px]"></div>

                <!-- ========================================== -->
                <!-- SECCIÓN: COLOR DE PIZARRA -->
                <!-- ========================================== -->
                <div class="relative">
                    <button id="toggle-pizarra" class="w-10 h-10 flex items-center justify-center bg-[#0A1420] rounded-lg border border-[#2a3a4e] hover:bg-[#FF8C00] hover:text-[#0A1420] text-[#FF8C00] transition" data-tooltip="Color de Pizarra">
                        <i class="fas fa-chalkboard"></i>
                    </button>
                    <div id="drop-pizarra" class="hidden absolute bottom-full mb-2 left-0 bg-[#0A1420] border border-[#2a3a4e] p-2.5 rounded-xl shadow-2xl flex gap-3 z-50 w-max">
                        <button id="bg-black" class="w-8 h-8 rounded-lg bg-black border border-[#2a3a4e] hover:scale-110 transition shadow-sm" data-tooltip="Pizarra Negra"></button>
                        <button id="bg-white" class="w-8 h-8 rounded-lg bg-[#F8F9FA] border border-[#2a3a4e] hover:scale-110 transition shadow-sm" data-tooltip="Pizarra Blanco Mate"></button>

                <label class="text-xs text-gray-400 uppercase tracking-wider">Tu código de sala</label>
                <div class="flex gap-2 mt-1">
                    <input type="text" id="share-code" class="flex-1 bg-[#1A2436] text-white border border-[#2a3a4e] p-2 rounded-lg font-mono text-center tracking-widest text-lg" readonly placeholder="...">
                    <button id="copy-share-btn" class="bg-[#FF8C00] text-black px-4 rounded-lg hover:bg-[#e07e00] font-bold"><i class="fas fa-copy"></i></button>
                </div>
                <button id="create-room-btn" class="w-full mt-2 py-2 bg-green-700 text-white rounded-lg font-bold hover:bg-green-600 transition text-sm"><i class="fas fa-broadcast-tower mr-2"></i>Crear Sala</button>
            </div>

            <!-- UNIRSE A SALA -->
            <div class="mb-4 p-3 bg-[#0A1420] border border-[#2a3a4e] rounded-lg">
                <label class="text-xs text-gray-400 uppercase tracking-wider">Unirse a una sala</label>
                <input type="text" id="join-name-input" class="w-full bg-[#1A2436] text-white border border-[#2a3a4e] p-2 rounded-lg text-sm mt-1 mb-1" placeholder="Tu nombre (ej: Juan)" maxlength="25">
                <div class="flex gap-2">
                    <input type="text" id="join-code-input" class="flex-1 bg-[#1A2436] text-white border border-[#2a3a4e] p-2 rounded-lg font-mono text-center tracking-widest uppercase" placeholder="PIZ-XXXX" maxlength="8">
                    <button id="join-room-btn" class="bg-blue-700 text-white px-4 rounded-lg hover:bg-blue-600 font-bold text-sm"><i class="fas fa-sign-in-alt mr-1"></i> Unirse</button>
                </div>
            </div>

            <!-- ESTADO Y PARTICIPANTES -->
            <div class="border-t border-[#2a3a4e] pt-3">
                <div class="flex justify-between items-center mb-2">
                    <h4 class="text-sm text-[#FF8C00] font-bold"><i class="fas fa-wifi mr-1"></i> Estado</h4>
                    <span id="peer-count" class="text-xs text-gray-500 font-mono">0 / 50</span>
                </div>
                <div id="peer-status" class="bg-[#0A1420] border border-[#2a3a4e] rounded-lg p-2 text-center text-sm text-gray-500 italic mb-2">
                    Sin conexión. Crea o únete a una sala.
                </div>
                <div id="participants-list" class="hidden max-h-40 overflow-y-auto flex flex-col gap-1">
                </div>
            </div>
        </div>
    </div>
    
    <!-- ========================================== -->
    <!-- CAPA 7: TOAST DE NOTIFICACIONES -->
    <!-- ========================================== -->
    <div id="toast" class="fixed bottom-6 right-6 bg-[#1A2436] text-white px-5 py-3 rounded-xl shadow-2xl hidden z-50 text-sm font-medium flex items-center gap-3 border border-[#2a3a4e]"><i class="fas fa-info-circle text-[#FF8C00]"></i><span id="toast-msg"></span></div>

    <!-- ========================================== -->
    <!-- CAPA 8: LÓGICA PRINCIPAL - JAVASCRIPT -->
    <!-- ========================================== -->
    <script>
        (function(){
            // ==========================================
            // CAPA 8.1: CONSTRUCTOR - PROPIEDADES INICIALES
            // ==========================================
            class PizarraProPlus {
                constructor() {
                    this.container = document.getElementById('canvas-container');
                    this.canvas = new fabric.Canvas('canvas', { selection: true, preserveObjectStacking: true, enableRetinaScaling: false });
                    this.pages = []; this.currentPageId = null; this.historyStack = []; this.historyIndex = -1;
                    this.isPanning = false; this.panStart = { x: 0, y: 0 };
                    
                    this.brushConfig = { width: 3, color: '#000000' }; 
                    this.highlighterConfig = { width: 25, color: 'rgba(255, 235, 59, 0.4)' };
                    
                    this.currentTool = 'draw'; 
                    this.clipboardObjects = null;

                    // CAPA 8.1.1: ESTADO DE LA BARRA FLOTANTE
                    this.toolbarCollapsed = false;
                    this.toolbarAutoCollapseTimer = null;
                    this.toolbarDragInfo = null;
                    this.toolbarPos = { left: null, top: null };
                    this.toolbarEl = null;
                    this.miniToolbarBtn = null;
                    
                    this.init();
                }

                // ==========================================
                // CAPA 8.2: INICIALIZACIÓN PRINCIPAL
                // ==========================================
                init() {
                    this.setupCanvas(); 
                    this.setupEventListeners(); 
                    this.setupResizableViewer();
                    this.setupPasteFromClipboard(); 
                    this.setupWebNavigation(); 
                    this.setupCalculator();
                    this.setupFileAttacher(); 
                    this.setupOfflineMode();
                    
                    this.loadFromLocalStorage(); 
                    setTimeout(() => {
                        this.centerCanvasView();
                        this.setTool('draw');
                        // Inicializar la barra flotante después de que todo esté renderizado
                        this.setupFloatingToolbar();
                    }, 100);
                }

                // ==========================================
                // CAPA 8.3: MODO OFFLINE
                // ==========================================
                setupOfflineMode() {
                    window.addEventListener('offline', () => this.showToast('Estás sin conexión. La pizarra sigue funcionando localmente.'));
                    window.addEventListener('online', () => this.showToast('Conexión a Internet restaurada.'));
                }

                // ==========================================
                // CAPA 8.4: CONFIGURACIÓN DEL LIENZO (CANVAS)
                // ==========================================
                setupCanvas() {
                    this.canvas.freeDrawingBrush = new fabric.PencilBrush(this.canvas);
                    
                    this.canvas.on('selection:created', (e) => { this.handleSelection(e); this.showContextMenu(e.selected[0]); });
                    this.canvas.on('selection:updated', (e) => { this.handleSelection(e); this.showContextMenu(e.selected[0]); });
                    this.canvas.on('selection:cleared', () => { this.hideContextMenu(); });
                    
                    this.canvas.on('object:moving', () => { this.hideContextMenu(); });
                    this.canvas.on('object:scaling', () => { this.hideContextMenu(); });
                    this.canvas.on('object:rotating', () => { this.hideContextMenu(); });
                    
                    this.canvas.on('mouse:down', (e) => this.onMouseDown(e));
                    this.canvas.on('mouse:move', (e) => this.onMouseMove(e));
                    this.canvas.on('mouse:up', () => this.onMouseUp());
                    
                    this.canvas.on('object:added', () => this.saveStateToHistory());
                    this.canvas.on('object:modified', (e) => {
                        this.saveStateToHistory();
                        if(this.canvas.getActiveObject()) this.showContextMenu(this.canvas.getActiveObject());
                    });
                }

                // ==========================================
                // CAPA 8.5: MENÚ CONTEXTUAL (CLIC DERECHO)
                // ==========================================
                showContextMenu(obj) {
                    const menu = document.getElementById('context-menu');
                    if (!obj) { this.hideContextMenu(); return; }
                    
                    const isGroup = obj.type === 'group';
                    const isSelection = obj.type === 'activeSelection';
                    const isText = (obj.type === 'i-text' || obj.type === 'textbox' || obj.isNote);
                    const isShape = (!isGroup && !isSelection && !isText && obj.type !== 'image');
                    
                    document.getElementById('ctx-group').style.display = isSelection ? 'flex' : 'none';
                    document.getElementById('ctx-ungroup').style.display = isGroup ? 'flex' : 'none';
                    document.getElementById('ctx-add-text').style.display = (!isSelection && !isGroup && !isText) ? 'flex' : 'none';
                    
                    document.getElementById('ctx-shape-sep').style.display = isShape ? 'block' : 'none';
                    document.getElementById('ctx-fill-label').style.display = isShape ? 'flex' : 'none';

                    if (isShape) {
                        let isFilled = false;
                        if (obj.fill && obj.fill !== 'transparent' && obj.fill !== '') {
                            isFilled = true;
                        }
                        document.getElementById('ctx-fill-cb').checked = isFilled;
                        
                        let objColor = this.brushConfig.color;
                        if (obj.stroke && obj.stroke !== 'transparent') objColor = obj.stroke;
                        else if (obj.fill && typeof obj.fill === 'string' && obj.fill !== 'transparent') objColor = obj.fill;
                    }

                    document.getElementById('ctx-sep').style.display = (isSelection || isGroup || (!isSelection && !isText) || isShape) ? 'block' : 'none';

                    setTimeout(() => {
                        const rect = obj.getBoundingRect();
                        menu.style.top = `${Math.max(10, rect.top - 55)}px`;
                        menu.style.left = `${Math.max(10, rect.left + (rect.width / 2) - (isShape ? 120 : 80))}px`;
                        menu.classList.remove('hidden');
                    }, 10);
                }

                hideContextMenu() {
                    document.getElementById('context-menu').classList.add('hidden');
                }

                // ==========================================
                // CAPA 8.6: MANEJO DE SELECCIÓN Y COLORES
                // ==========================================
                handleSelection(e) {
                    const obj = e.selected ? e.selected[0] : null;
                    if (!obj) return;
                    
                    if (obj.type === 'i-text' || obj.type === 'textbox' || obj.isNote) {
                        document.getElementById('font-family-select').value = obj.fontFamily || 'Arial';
                        document.getElementById('font-size-select').value = obj.fontSize || 16;
                        document.getElementById('text-bold-btn').classList.toggle('text-[#FF8C00]', obj.fontWeight === 'bold');
                        document.getElementById('text-italic-btn').classList.toggle('text-[#FF8C00]', obj.fontStyle === 'italic');
                        document.getElementById('text-color-btn').value = obj.fill || '#000000';
                        let bg = obj.backgroundColor || '#000000';
                        if(bg.startsWith('rgba') || bg === '') bg = '#000000';
                        document.getElementById('text-bg-btn').value = bg;
                    } else {
                        let isFilled = false;
                        if (obj.fill && obj.fill !== 'transparent' && obj.fill !== '') {
                            isFilled = true;
                            if (typeof obj.fill === 'string' && !obj.fill.startsWith('url')) {
                                document.getElementById('text-bg-btn').value = obj.fill;
                            }
                        }
                        if (obj.stroke && obj.stroke !== 'transparent') {
                            document.getElementById('brush-color').value = obj.stroke;
                            this.brushConfig.color = obj.stroke;
                        }
                        document.querySelectorAll('.fill-shape-cb').forEach(cb => cb.checked = isFilled);
                    }
                }

                updateShapeColors(obj) {
                    if (!obj || obj.type === 'i-text' || obj.type === 'textbox' || obj.type === 'image' || obj.isNote) return;

                    const isFilled = document.querySelector('.fill-shape-cb') && document.querySelector('.fill-shape-cb').checked;
                    const strokeColor = document.getElementById('brush-color').value;
                    const bgColor = strokeColor; 

                    const fillColor = isFilled ? bgColor : 'transparent';
                    const shapeStroke = isFilled ? 'transparent' : strokeColor;
                    const shapeStrokeWidth = isFilled ? 0 : 3;

                    if (obj.type === 'group') {
                        obj.forEachObject(child => {
                            if (child.type === 'line') child.set({ stroke: strokeColor });
                            else if (child.type === 'triangle') child.set({ fill: strokeColor });
                            else child.set({ fill: fillColor, stroke: shapeStroke, strokeWidth: shapeStrokeWidth });
                        });
                    } else if (obj.type === 'line' || (obj.type === 'path' && !obj.closed && !obj.fill)) {
                        obj.set({ stroke: strokeColor });
                    } else if (obj.type === 'circle' && obj.fill && obj.fill.type === 'radial') {
                        const baseColor = isFilled ? bgColor : strokeColor;
                        obj.set('fill', new fabric.Gradient({
                            type: 'radial',
                            coords: { r1: 0, r2: 50, x1: 20, y1: 20, x2: 50, y2: 50 },
                            colorStops: [{ offset: 0, color: '#ffffff' }, { offset: 1, color: baseColor }]
                        }));
                    } else {
                        obj.set({ fill: fillColor, stroke: shapeStroke, strokeWidth: shapeStrokeWidth });
                    }
                }

                // ==========================================
                // CAPA 8.7: NAVEGACIÓN Y POSICIONAMIENTO DEL LIENZO
                // ==========================================
                getVisibleCenter() {
                    return { x: this.container.scrollLeft + this.container.clientWidth / 2, y: this.container.scrollTop + this.container.clientHeight / 2 };
                }

                centerCanvasView() {
                    this.container.scrollLeft = Math.max(0, (this.canvas.getWidth() - this.container.clientWidth) / 2);
                    this.container.scrollTop = Math.max(0, (this.canvas.getHeight() - this.container.clientHeight) / 2);
                }

                // ==========================================
                // CAPA 8.8: GESTIÓN DE HERRAMIENTAS DE DIBUJO
                // ==========================================
                updateBrushFromConfig() {
                    if (this.currentTool === 'draw') { 
                        this.canvas.freeDrawingBrush.width = this.brushConfig.width; 
                        this.canvas.freeDrawingBrush.color = this.brushConfig.color; 
                    }
                    else if (this.currentTool === 'highlighter') { 
                        this.canvas.freeDrawingBrush.width = this.highlighterConfig.width; 
                        this.canvas.freeDrawingBrush.color = this.highlighterConfig.color; 
                    }
                    else if (this.currentTool === 'eraser') { 
                        this.canvas.freeDrawingBrush.width = 30; 
                        this.canvas.freeDrawingBrush.color = this.canvas.backgroundColor || '#F8F9FA'; 
                    }
                }

                setTool(tool) {
                    this.currentTool = tool;
                    this.canvas.isDrawingMode = ['draw', 'highlighter', 'eraser'].includes(tool);
                    this.canvas.selection = (tool === 'select'); 
                    this.isPanning = (tool === 'pan');
                    
                    if (this.canvas.isDrawingMode) { 
                        this.updateBrushFromConfig(); 
                        this.canvas.freeDrawingCursor = "url('data:image/svg+xml;utf8,<svg xmlns=\"http://www.w3.org/2000/svg\" width=\"24\" height=\"24\" viewBox=\"0 0 24 24\" fill=\"%23FF8C00\"><path d=\"M3 17.25V21h3.75L17.81 9.94l-3.75-3.75L3 17.25zM20.71 5.63l-2.34-2.34a1 1 0 0 0-1.41 0l-1.83 1.83 3.75 3.75 1.83-1.83a1 1 0 0 0 0-1.41z\"/></svg>') 0 24, auto";
                    } 
                    else { 
                        this.canvas.defaultCursor = this.isPanning ? 'grab' : 'default'; 
                    }
                    
                    document.querySelectorAll('.quick-tool-horizontal').forEach(btn => btn.classList.remove('tool-active'));
                    
                    const activeBtn = document.getElementById(`${tool}-btn-float`);
                    if (activeBtn) activeBtn.classList.add('tool-active');

                    // CAPA 8.8.1: AUTO-COLAPSO DE LA BARRA FLOTANTE AL SELECCIONAR HERRAMIENTA
                    if (!this.toolbarCollapsed && this.toolbarEl) {
                        this.startToolbarAutoCollapse();
                    }
                }

                // ==========================================
                // CAPA 8.9: EVENTOS DE PANNING (ARRASTRAR LIENZO)
                // ==========================================
                onMouseDown(e) { if (this.isPanning) this.panStart = { x: e.e.clientX, y: e.e.clientY }; }
                onMouseMove(e) {
                    if (this.isPanning && e.e.buttons === 1) {
                        this.container.scrollLeft -= (e.e.clientX - this.panStart.x);
                        this.container.scrollTop -= (e.e.clientY - this.panStart.y);
                        this.panStart = { x: e.e.clientX, y: e.e.clientY };
                    }
                }
                onMouseUp() { if (this.isPanning) this.canvas.defaultCursor = 'grab'; }

                // ==========================================
                // CAPA 8.10: CREACIÓN DE FORMAS Y OBJETOS
                // ==========================================
                addShape(type) {
                    const center = this.getVisibleCenter();
                    let obj;
                    
                    const strokeColor = this.brushConfig.color;
                    const fontFamily = document.getElementById('font-family-select').value;
                    const fontSize = parseInt(document.getElementById('font-size-select').value);
                    
                    const isFilled = document.querySelector('.fill-shape-cb') && document.querySelector('.fill-shape-cb').checked;
                    const bgColor = strokeColor; 
                    
                    const fillColor = isFilled ? bgColor : 'transparent';
                    const shapeStroke = isFilled ? 'transparent' : strokeColor;
                    const shapeStrokeWidth = isFilled ? 0 : 3;
                    
                    const commonOpts = { fill: fillColor, stroke: shapeStroke, strokeWidth: shapeStrokeWidth, originX: 'center', originY: 'center', left: center.x, top: center.y };

                    const createPolygon = (sides, radius) => {
                        const points = [];
                        const angle = (Math.PI * 2) / sides;
                        for (let i = 0; i < sides; i++) points.push({ x: radius * Math.sin(i * angle), y: -radius * Math.cos(i * angle) });
                        return new fabric.Polygon(points, commonOpts);
                    };

                    switch(type) {
                        case 'rect': case 'square': obj = new fabric.Rect({ ...commonOpts, width: 100, height: 100 }); break;
                        case 'circle': obj = new fabric.Circle({ ...commonOpts, radius: 50 }); break;
                        case 'line': obj = new fabric.Line([center.x-100, center.y, center.x+100, center.y], { stroke: strokeColor, strokeWidth: 4 }); break;
                        case 'text': obj = new fabric.IText('Doble clic para editar', { left: center.x-80, top: center.y-15, fontSize: fontSize, fontFamily: fontFamily, fill: strokeColor }); break;
                        
                        case 'line-v': obj = new fabric.Line([center.x, center.y-80, center.x, center.y+80], { stroke: strokeColor, strokeWidth: 4 }); break;
                        case 'line-h': obj = new fabric.Line([center.x-80, center.y, center.x+80, center.y], { stroke: strokeColor, strokeWidth: 4 }); break;
                        case 'line-diagonal': obj = new fabric.Line([center.x-50, center.y-50, center.x+50, center.y+50], { stroke: strokeColor, strokeWidth: 4 }); break;
                        case 'line-dashed': obj = new fabric.Line([center.x-100, center.y, center.x+100, center.y], { stroke: strokeColor, strokeWidth: 4, strokeDashArray: [10, 5] }); break;
                        case 'curve': obj = new fabric.Path('M 0 50 Q 50 -50 100 50', { fill: '', stroke: strokeColor, strokeWidth: 4, left: center.x-50, top: center.y-25 }); break;
                        
                        case 'arrow-1': 
                            const lRight = new fabric.Line([-50, 0, 50, 0], { stroke: strokeColor, strokeWidth: 4 });
                            const hRight = new fabric.Triangle({ width: 15, height: 15, fill: strokeColor, left: 50, top: 0, originX: 'center', originY: 'center', angle: 90 });
                            obj = new fabric.Group([lRight, hRight], { left: center.x, top: center.y });
                            break;
                        case 'arrow-left': 
                            const lLeft = new fabric.Line([-50, 0, 50, 0], { stroke: strokeColor, strokeWidth: 4 });
                            const hLeft = new fabric.Triangle({ width: 15, height: 15, fill: strokeColor, left: -50, top: 0, originX: 'center', originY: 'center', angle: -90 });
                            obj = new fabric.Group([lLeft, hLeft], { left: center.x, top: center.y });
                            break;
                        case 'arrow-up': 
                            const lUp = new fabric.Line([0, -50, 0, 50], { stroke: strokeColor, strokeWidth: 4 });
                            const hUp = new fabric.Triangle({ width: 15, height: 15, fill: strokeColor, left: 0, top: -50, originX: 'center', originY: 'center', angle: 0 });
                            obj = new fabric.Group([lUp, hUp], { left: center.x, top: center.y });
                            break;
                        case 'arrow-down': 
                            const lDown = new fabric.Line([0, -50, 0, 50], { stroke: strokeColor, strokeWidth: 4 });
                            const hDown = new fabric.Triangle({ width: 15, height: 15, fill: strokeColor, left: 0, top: 50, originX: 'center', originY: 'center', angle: 180 });
                            obj = new fabric.Group([lDown, hDown], { left: center.x, top: center.y });
                            break;
                        case 'arrow-2': 
                            const lH = new fabric.Line([-50, 0, 50, 0], { stroke: strokeColor, strokeWidth: 4 });
                            const hH1 = new fabric.Triangle({ width: 15, height: 15, fill: strokeColor, left: 50, top: 0, originX: 'center', originY: 'center', angle: 90 });
                            const hH2 = new fabric.Triangle({ width: 15, height: 15, fill: strokeColor, left: -50, top: 0, originX: 'center', originY: 'center', angle: -90 });
                            obj = new fabric.Group([lH, hH1, hH2], { left: center.x, top: center.y });
                            break;
                        case 'arrow-v-double': 
                            const lV = new fabric.Line([0, -50, 0, 50], { stroke: strokeColor, strokeWidth: 4 });
                            const hV1 = new fabric.Triangle({ width: 15, height: 15, fill: strokeColor, left: 0, top: -50, originX: 'center', originY: 'center', angle: 0 });
                            const hV2 = new fabric.Triangle({ width: 15, height: 15, fill: strokeColor, left: 0, top: 50, originX: 'center', originY: 'center', angle: 180 });
                            obj = new fabric.Group([lV, hV1, hV2], { left: center.x, top: center.y });
                            break;

                        case 'rectangle': obj = new fabric.Rect({ ...commonOpts, width: 160, height: 80 }); break;
                        case 'rhombus': obj = new fabric.Polygon([{x:50,y:0},{x:100,y:50},{x:50,y:100},{x:0,y:50}], commonOpts); break;
                        case 'trapezoid': obj = new fabric.Polygon([{x:20,y:0},{x:80,y:0},{x:100,y:60},{x:0,y:60}], commonOpts); break;
                        case 'parallelogram': obj = new fabric.Polygon([{x:20,y:0},{x:120,y:0},{x:100,y:60},{x:0,y:60}], commonOpts); break;
                        case 'tri-equilateral': obj = new fabric.Triangle({ ...commonOpts, width: 100, height: 86.6 }); break;
                        case 'tri-isosceles': obj = new fabric.Triangle({ ...commonOpts, width: 60, height: 100 }); break;
                        case 'tri-scalene': obj = new fabric.Polygon([{x:0,y:100},{x:80,y:100},{x:30,y:0}], commonOpts); break;
                        case 'pentagon': obj = createPolygon(5, 60); break;
                        case 'hexagon': obj = createPolygon(6, 60); break;
                        case 'heptagon': obj = createPolygon(7, 60); break;
                        case 'octagon': obj = createPolygon(8, 60); break;
                        case 'nonagon': obj = createPolygon(9, 60); break;
                        case 'ellipse': obj = new fabric.Ellipse({ ...commonOpts, rx: 70, ry: 40 }); break;
                        case 'star':
                            const starPoints = [];
                            const outerR = 50, innerR = 20;
                            for (let i = 0; i < 10; i++) {
                                let r = i % 2 === 0 ? outerR : innerR;
                                let angle = (Math.PI * 2 * i) / 10 - Math.PI / 2;
                                starPoints.push({ x: r * Math.cos(angle), y: r * Math.sin(angle) });
                            }
                            obj = new fabric.Polygon(starPoints, commonOpts); 
                            break;

                        case 'cube': obj = new fabric.Path('M 0 30 L 40 10 L 80 30 L 80 70 L 40 90 L 0 70 Z M 0 30 L 40 50 L 80 30 M 40 50 L 40 90', { ...commonOpts }); break;
                        case 'prism': obj = new fabric.Path('M 0 30 L 40 10 L 80 30 L 80 70 L 40 90 L 0 70 Z M 0 30 L 80 30 M 40 10 L 40 90', { ...commonOpts }); break;
                        case 'pyramid': obj = new fabric.Path('M 0 60 L 80 60 L 40 0 Z M 0 60 L 30 40 L 80 60 M 30 40 L 40 0', { ...commonOpts, left: center.x-40, top: center.y-30}); break;
                        case 'tetrahedron': obj = new fabric.Path('M 0 60 L 80 60 L 40 0 Z M 40 0 L 50 40 L 80 60 M 0 60 L 50 40', { ...commonOpts, left: center.x-40, top: center.y-30}); break;
                        case 'cylinder': obj = new fabric.Path('M 0 20 C 0 0, 60 0, 60 20 C 60 40, 0 40, 0 20 L 0 80 C 0 100, 60 100, 60 80 L 60 20', { ...commonOpts, left: center.x-30, top: center.y-50}); break;
                        case 'cone': obj = new fabric.Path('M 30 0 L 0 80 C 0 100, 60 100, 60 80 Z M 0 80 C 0 60, 60 60, 60 80', { ...commonOpts, left: center.x-30, top: center.y-50 }); break;
                        case 'sphere': 
                            const baseColor = isFilled ? bgColor : strokeColor;
                            obj = new fabric.Circle({ ...commonOpts, radius: 50, fill: baseColor });
                            obj.set('fill', new fabric.Gradient({
                                type: 'radial',
                                coords: { r1: 0, r2: 50, x1: 20, y1: 20, x2: 50, y2: 50 },
                                colorStops: [{ offset: 0, color: '#ffffff' }, { offset: 1, color: baseColor }]
                            }));
                            break;

                        case 'sticky':
                            obj = new fabric.Textbox('Doble clic para editar...', {
                                left: center.x, top: center.y, width: 220,
                                fontSize: fontSize, fontFamily: fontFamily, fill: '#334155',
                                backgroundColor: '#fef08a', padding: 15,
                                shadow: new fabric.Shadow({ color: 'rgba(0,0,0,0.3)', blur: 5, offsetX: 3, offsetY: 3 }),
                                originX: 'center', originY: 'center', textAlign: 'center', splitByGrapheme: true
                            });
                            obj.isNote = true;
                            break;
                    }
                    if(obj) {
                        this.canvas.add(obj);
                        this.canvas.setActiveObject(obj);
                        this.canvas.renderAll();
                        this.setTool('select'); 
                        this.saveStateToHistory();
                    }
                }

                // ==========================================
                // CAPA 8.11: OPERACIONES DE EDICIÓN (COPIAR, PEGAR, BORRAR)
                // ==========================================
                deleteSelection() {
                    const activeObjects = this.canvas.getActiveObjects();
                    if (activeObjects.length > 0) {
                        activeObjects.forEach(obj => this.canvas.remove(obj));
                        this.canvas.discardActiveObject();
                        this.canvas.renderAll();
                        this.saveStateToHistory();
                        this.hideContextMenu();
                        this.showToast('Objeto(s) eliminado(s)');
                    } else {
                        this.showToast('Selecciona algo para borrar');
                    }
                }

                copySelected() {
                    const activeObject = this.canvas.getActiveObject();
                    if (activeObject) {
                        activeObject.clone((cloned) => {
                            this.clipboardObjects = cloned;
                            this.showToast('Copiado al portapapeles');
                        });
                    }
                }

                pasteFromInternal() {
                    if (!this.clipboardObjects) return;
                    this.clipboardObjects.clone((clonedObj) => {
                        this.canvas.discardActiveObject();
                        clonedObj.set({ left: clonedObj.left + 20, top: clonedObj.top + 20, evented: true });

                        if (clonedObj.type === 'activeSelection') {
                            clonedObj.canvas = this.canvas;
                            clonedObj.forEachObject((obj) => { this.canvas.add(obj); });
                            clonedObj.setCoords();
                        } else {
                            this.canvas.add(clonedObj);
                        }

                        this.clipboardObjects.top += 20;
                        this.clipboardObjects.left += 20;

                        this.canvas.setActiveObject(clonedObj);
                        this.canvas.renderAll();
                        this.saveStateToHistory();
                    });
                }

                // ==========================================
                // CAPA 8.12: VISOR WEB Y NAVEGACIÓN
                // ==========================================
                setupWebNavigation() {
                    const webUrlInput = document.getElementById('web-url-input');
                    const webGoBtn = document.getElementById('web-go-btn');
                    const webIframe = document.getElementById('web-iframe');

                    const navigate = () => {
                        if (!navigator.onLine) {
                            this.showToast('Sin conexión a Internet. La búsqueda web no está disponible.');
                            return;
                        }
                        
                        let query = webUrlInput.value.trim();
                        if(query === '') return;
                        if (!/^https?:\/\//i.test(query) && !query.includes('.')) {
                            webIframe.src = 'https://www.google.com/search?igu=1&q=' + encodeURIComponent(query);
                        } else {
                            if (!/^https?:\/\//i.test(query)) query = 'https://' + query;
                            webIframe.src = query;
                        }
                    };

                    webGoBtn.onclick = navigate;
                    webUrlInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') navigate(); });
                }

                // ==========================================
                // CAPA 8.13: CALCULADORA MODAL
                // ==========================================
                setupCalculator() {
                    const modal = document.getElementById('modal-calc');
                    const calcInput = document.getElementById('calc-input');
                    
                    const evaluateMath = (expr) => {
                        try {
                            const safeExpr = expr.replace(/[^-()\d/*+.]/g, '');
                            return new Function(`'use strict'; return (${safeExpr})`)();
                        } catch(e) { return 'Error'; }
                    };

                    document.querySelectorAll('.calc-btn').forEach(btn => {
                        btn.addEventListener('click', () => {
                            if(calcInput.value === 'Error') calcInput.value = '';
                            calcInput.value += btn.getAttribute('data-val');
                        });
                    });

                    document.getElementById('calc-clear').onclick = () => { calcInput.value = ''; };
                    document.getElementById('calc-percent').onclick = () => { calcInput.value += '% de '; };
                    
                    document.getElementById('calc-equal').onclick = () => {
                        let val = calcInput.value;
                        if (val.includes('% de ')) {
                            let parts = val.split('% de ');
                            if(parts.length === 2) {
                                let percent = parseFloat(parts[0]);
                                let number = parseFloat(parts[1]);
                                if(!isNaN(percent) && !isNaN(number)) {
                                    calcInput.value = (percent / 100 * number).toString();
                                    return;
                                }
                            }
                        }
                        calcInput.value = evaluateMath(val);
                    };

                    document.addEventListener('keydown', (e) => {
                        if (!modal.classList.contains('hidden')) {
                            if (e.key >= '0' && e.key <= '9') calcInput.value += e.key;
                            if (['+', '-', '*', '/'].includes(e.key)) calcInput.value += e.key;
                            if (e.key === 'Enter') document.getElementById('calc-equal').click();
                            if (e.key === 'Escape') modal.classList.add('hidden');
                            if (e.key === '.') calcInput.value += '.';
                            if (e.key === 'Backspace') calcInput.value = calcInput.value.slice(0, -1);
                        }
                    });
                }

                // ==========================================
                // CAPA 8.14: ADJUNTAR ARCHIVOS
                // ==========================================
                setupFileAttacher() {
                    const fileInput = document.getElementById('main-file-input');
                    const attachBtn = document.getElementById('attach-file-btn');
                    
                    attachBtn.onclick = () => { fileInput.click(); };

                    fileInput.onchange = (e) => {
                        const file = e.target.files[0];
                        if (!file) return;
                        const blobUrl = URL.createObjectURL(file);
                        
                        if (file.type.startsWith('image/')) {
                            fabric.Image.fromURL(blobUrl, (img) => {
                                const center = this.getVisibleCenter();
                                img.scaleToWidth(400); 
                                img.set({ left: center.x - img.getScaledWidth()/2, top: center.y - img.getScaledHeight()/2 });
                                this.canvas.add(img);
                                this.canvas.setActiveObject(img);
                                this.setTool('select');
                                this.saveStateToHistory();
                                this.showToast('Imagen pegada en la pizarra');
                            });
                        } else {
                            this.showInViewer(file, blobUrl, file.type);
                            this.showToast('Archivo abierto en el visor');
                        }
                        fileInput.value = '';
                    };
                }

                showInViewer(file, blobUrl, fileType) {
                    const viewerDiv = document.getElementById('doc-viewer');
                    const contentDiv = document.getElementById('viewer-content');
                    contentDiv.innerHTML = ''; 

                    if (fileType === 'application/pdf') {
                        const iframe = document.createElement('iframe');
                        iframe.src = blobUrl;
                        iframe.style.width = '100%';
                        iframe.style.height = '100%';
                        contentDiv.appendChild(iframe);
                    } else {
                        contentDiv.innerHTML = `
                            <div class="text-center p-4">
                                <i class="fas fa-file-alt text-5xl text-gray-400 mb-4"></i>
                                <p class="text-white font-bold mb-2">${file.name}</p>
                                <p class="text-gray-400 text-sm mb-4">El navegador no puede previsualizar este formato de documento nativamente. Para verlo aquí, conviértelo a PDF.</p>
                                <a href="${blobUrl}" download="${file.name}" class="px-4 py-2 bg-[#FF8C00] text-[#0A1420] rounded-lg font-bold hover:bg-[#e07e00]">Descargar Archivo</a>
                            </div>
                        `;
                    }
                    
                    document.getElementById('web-viewer').classList.add('hidden'); 
                    viewerDiv.classList.remove('hidden');
                    
                    const webBtn = document.getElementById('web-viewer-btn');
                    webBtn.classList.remove('bg-[#FF8C00]', 'text-[#0A1420]', 'border-[#FF8C00]');
                    webBtn.classList.add('bg-[#1A2436]', 'text-gray-300', 'border-[#2a3a4e]');
                }

                // ==========================================
                // CAPA 8.15: PEGAR DESDE EL PORTAPAPELES DEL SISTEMA
                // ==========================================
                setupPasteFromClipboard() {
                    document.addEventListener('paste', (e) => {
                        if (document.activeElement && (document.activeElement.tagName === 'INPUT' || document.activeElement.tagName === 'TEXTAREA' || this.canvas.getActiveObject()?.isEditing)) return;
                        
                        const items = (e.clipboardData || window.clipboardData).items;
                        let hasImage = false;

                        for (let i = 0; i < items.length; i++) {
                            if (items[i].type.indexOf('image') !== -1) {
                                hasImage = true;
                                const blob = items[i].getAsFile(); 
                                const reader = new FileReader();
                                reader.onload = (event) => {
                                    fabric.Image.fromURL(event.target.result, (img) => {
                                        const center = this.getVisibleCenter(); 
                                        if(img.width > 800) img.scaleToWidth(800);
                                        img.set({ left: center.x - img.getScaledWidth()/2, top: center.y - img.getScaledHeight()/2 });
                                        this.canvas.add(img); this.canvas.setActiveObject(img); this.canvas.renderAll(); this.saveStateToHistory();
                                        this.showToast('Imagen pegada');
                                    });
                                }; 
                                reader.readAsDataURL(blob); 
                                e.preventDefault(); 
                                break;
                            }
                        }

                        if (!hasImage) {
                            const textData = (e.clipboardData || window.clipboardData).getData('text');
                            if (textData && textData.trim() !== '') {
                                const center = this.getVisibleCenter();
                                const fontFamilySelect = document.getElementById('font-family-select');
                                const fontSizeSelect = document.getElementById('font-size-select');
                                const fontFamily = fontFamilySelect ? fontFamilySelect.value : 'Arial';
                                const fontSize = fontSizeSelect ? parseInt(fontSizeSelect.value) : 24;
                                
                                const textObj = new fabric.IText(textData, {
                                    left: center.x, top: center.y,
                                    fontFamily: fontFamily, fontSize: fontSize,
                                    fill: this.brushConfig.color || '#000000',
                                    originX: 'center', originY: 'center'
                                });
                                this.canvas.add(textObj);
                                this.canvas.setActiveObject(textObj);
                                this.canvas.renderAll();
                                this.saveStateToHistory();
                                this.showToast('Texto pegado');
                                e.preventDefault();
                            }
                        }
                    });
                }

                // ==========================================
                // CAPA 8.16: VISOR REDIMENSIONABLE
                // ==========================================
                setupResizableViewer() {
                    const docViewer = document.getElementById('doc-viewer'), webViewer = document.getElementById('web-viewer'), handle = document.getElementById('resize-handle');
                    let startX, startWidth, activeViewer = null;
                    handle.addEventListener('mousedown', (e) => {
                        if (!docViewer.classList.contains('hidden')) activeViewer = docViewer; else if (!webViewer.classList.contains('hidden')) activeViewer = webViewer; else return;
                        startX = e.clientX; startWidth = activeViewer.offsetWidth; document.body.style.cursor = 'ew-resize';
                        const onMouseMove = (me) => { activeViewer.style.width = Math.min(Math.max(startWidth + (startX - me.clientX), 280), window.innerWidth * 0.8) + 'px'; };
                        const onMouseUp = () => { document.removeEventListener('mousemove', onMouseMove); document.removeEventListener('mouseup', onMouseUp); document.body.style.cursor = ''; activeViewer = null; };
                        document.addEventListener('mousemove', onMouseMove); document.addEventListener('mouseup', onMouseUp); e.preventDefault();
                    });
                }

                // ==========================================
                // CAPA 8.17: NOTIFICACIONES TOAST
                // ==========================================
                showToast(msg) { const toast = document.getElementById('toast'); document.getElementById('toast-msg').textContent = msg; toast.classList.remove('hidden'); setTimeout(() => toast.classList.add('hidden'), 3000); }

                // ==========================================
                // CAPA 8.18: HISTORIAL (UNDO / REDO)
                // ==========================================
                saveStateToHistory() {
                    if (this.canvas.isEmpty() && this.historyStack.length === 0) return;
                    const json = JSON.stringify(this.canvas.toJSON(['isNote']));
                    if (this.historyIndex < this.historyStack.length - 1) this.historyStack = this.historyStack.slice(0, this.historyIndex + 1);
                    this.historyStack.push(json); this.historyIndex++;
                    if (this.historyStack.length > 30) { this.historyStack.shift(); this.historyIndex--; }
                }
                undo() { if (this.historyIndex > 0) { this.historyIndex--; this.canvas.loadFromJSON(this.historyStack[this.historyIndex], () => { this.canvas.renderAll(); this.hideContextMenu(); }); } }
                redo() { if (this.historyIndex < this.historyStack.length - 1) { this.historyIndex++; this.canvas.loadFromJSON(this.historyStack[this.historyIndex], () => { this.canvas.renderAll(); this.hideContextMenu(); }); } }

                // ==========================================
                // CAPA 8.19: GESTIÓN DE PÁGINAS Y ALMACENAMIENTO LOCAL
                // ==========================================
                saveCurrentPage() { const page = this.pages.find(p => p.id === this.currentPageId); if (page) { page.json = JSON.stringify(this.canvas.toJSON(['isNote'])); this.saveToLocalStorage(); } }
                loadPage(id) { this.saveCurrentPage(); const page = this.pages.find(p => p.id === id); if (page) { this.currentPageId = id; this.canvas.loadFromJSON(page.json, () => { this.canvas.renderAll(); this.renderPagesHorizontal(); this.hideContextMenu(); }); } }
                createPage() { const newId = Date.now(); this.pages.push({ id: newId, name: `Pág ${this.pages.length + 1}`, json: JSON.stringify({ objects: [], background: '#F8F9FA' }) }); this.currentPageId = newId; this.canvas.clear(); this.canvas.backgroundColor = '#F8F9FA'; this.renderPagesHorizontal(); this.hideContextMenu(); }
                renderPagesHorizontal() {
                    const container = document.getElementById('pages-list-horizontal'); container.innerHTML = '';
                    this.pages.forEach(page => {
                        const btn = document.createElement('button'); btn.textContent = page.name;
                        btn.className = `px-3 py-1.5 rounded-lg text-sm transition page-tab ${this.currentPageId === page.id ? 'active' : ''}`;
                        btn.onclick = () => this.loadPage(page.id); container.appendChild(btn);
                    });
                }
                saveToLocalStorage() { try { localStorage.setItem('pizarra_pro_pages', JSON.stringify(this.pages)); localStorage.setItem('pizarra_pro_current', this.currentPageId); } catch(e) {} }
                loadFromLocalStorage() { const stored = localStorage.getItem('pizarra_pro_pages'); if (stored) { this.pages = JSON.parse(stored); this.currentPageId = parseInt(localStorage.getItem('pizarra_pro_current')) || this.pages[0]?.id; this.loadPage(this.currentPageId); } else this.createPage(); }

                // ==========================================
                // CAPA 8.20: BARRA FLOTANTE - DRAG, MINIMIZAR Y AUTO-COLAPSO
                // ==========================================
                setupFloatingToolbar() {
                    const toolbar = document.getElementById('floating-toolbar');
                    const miniBtn = document.getElementById('mini-toolbar-btn');
                    const dragHandle = document.getElementById('toolbar-drag-handle');
                    const minimizeBtn = document.getElementById('toolbar-minimize-btn');
                    const mainArea = document.getElementById('main-area'); // contenedor relativo

                    // Guardar referencias en la instancia
                    this.toolbarEl = toolbar;
                    this.miniToolbarBtn = miniBtn;

                    // Función para obtener la posición actual de la barra relativa al contenedor principal
                    const captureToolbarPosition = () => {
                        const rect = toolbar.getBoundingClientRect();
                        const areaRect = mainArea.getBoundingClientRect();
                        this.toolbarPos = {
                            left: rect.left - areaRect.left,
                            top: rect.top - areaRect.top
                        };
                    };

                    // Capturar posición inicial
                    captureToolbarPosition();

                    // Aplicar posición absoluta (eliminando el centrado CSS inicial)
                    const applyAbsolutePosition = () => {
                        toolbar.style.left = this.toolbarPos.left + 'px';
                        toolbar.style.top = this.toolbarPos.top + 'px';
                        toolbar.style.bottom = 'auto';
                        toolbar.style.transform = 'none';
                    };
                    applyAbsolutePosition();

                    // ==========================================
                    // SUB-CAPA 8.20.1: DRAG (ARRASTRE) DE LA BARRA
                    // ==========================================
                    dragHandle.addEventListener('mousedown', (e) => {
                        e.preventDefault();
                        e.stopPropagation();
                        // Cancelar auto-colapso mientras se arrastra
                        this.cancelToolbarAutoCollapse();
                        
                        captureToolbarPosition();
                        this.toolbarDragInfo = {
                            startX: e.clientX,
                            startY: e.clientY,
                            origLeft: this.toolbarPos.left,
                            origTop: this.toolbarPos.top
                        };
                        toolbar.classList.add('dragging');
                        
                        const onDragMove = (moveEvent) => {
                            if (!this.toolbarDragInfo) return;
                            const dx = moveEvent.clientX - this.toolbarDragInfo.startX;
                            const dy = moveEvent.clientY - this.toolbarDragInfo.startY;
                            const areaRect = mainArea.getBoundingClientRect();
                            // Calcular límites para que no se salga del área visible
                            const maxLeft = areaRect.width - toolbar.offsetWidth;
                            const maxTop = areaRect.height - toolbar.offsetHeight;
                            const newLeft = Math.max(0, Math.min(this.toolbarDragInfo.origLeft + dx, maxLeft));
                            const newTop = Math.max(0, Math.min(this.toolbarDragInfo.origTop + dy, maxTop));
                            toolbar.style.left = newLeft + 'px';
                            toolbar.style.top = newTop + 'px';
                        };

                        const onDragEnd = () => {
                            document.removeEventListener('mousemove', onDragMove);
                            document.removeEventListener('mouseup', onDragEnd);
                            toolbar.classList.remove('dragging');
                            if (this.toolbarDragInfo) {
                                this.toolbarPos.left = parseFloat(toolbar.style.left);
                                this.toolbarPos.top = parseFloat(toolbar.style.top);
                                this.toolbarDragInfo = null;
                            }
                            // Sincronizar posición del mini botón
                            this.updateMiniBtnPosition();
                            // Reiniciar timer de auto-colapso
                            if (!this.toolbarCollapsed) {
                                this.startToolbarAutoCollapse();
                            }
                        };

                        document.addEventListener('mousemove', onDragMove);
                        document.addEventListener('mouseup', onDragEnd);
                    });

                    // ==========================================
                    // SUB-CAPA 8.20.2: MINIMIZAR Y EXPANDIR
                    // ==========================================
                    minimizeBtn.addEventListener('click', (e) => {
                        e.stopPropagation();
                        this.collapseToolbar();
                    });

                    miniBtn.addEventListener('click', (e) => {
                        e.stopPropagation();
                        this.expandToolbar();
                    });

                    // ==========================================
                    // SUB-CAPA 8.20.3: HOVER - GESTIÓN DEL AUTO-COLAPSO
                    // ==========================================
                    toolbar.addEventListener('mouseenter', () => {
                        // Si el mouse entra en la barra, cancelar el timer
                        this.cancelToolbarAutoCollapse();
                    });

                    toolbar.addEventListener('mouseleave', () => {
                        // Si el mouse sale de la barra y no está minimizada, iniciar timer
                        if (!this.toolbarCollapsed) {
                            this.startToolbarAutoCollapse();
                        }
                    });

                    // Iniciar el timer por primera vez
                    this.startToolbarAutoCollapse();
                }

                /**
                 * Minimiza la barra flotante y muestra el botón flotante compacto
                 */
                collapseToolbar() {
