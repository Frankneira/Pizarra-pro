                    if (this.toolbarCollapsed) return;
                    this.toolbarCollapsed = true;
                    this.cancelToolbarAutoCollapse();
                    // Guardar posición actual antes de ocultar
                    const toolbar = this.toolbarEl;
                    if (toolbar.style.left && toolbar.style.top) {
                        this.toolbarPos.left = parseFloat(toolbar.style.left);
                        this.toolbarPos.top = parseFloat(toolbar.style.top);
                    }
                    toolbar.classList.add('hidden');
                    this.updateMiniBtnPosition();
                    this.miniToolbarBtn.classList.remove('hidden');
                }

                /**
                 * Expande la barra flotante desde el botón minimizado
                 */
                expandToolbar() {
                    if (!this.toolbarCollapsed) return;
                    this.toolbarCollapsed = false;
                    this.miniToolbarBtn.classList.add('hidden');
                    this.toolbarEl.classList.remove('hidden');
                    // Restaurar posición
                    this.toolbarEl.style.left = this.toolbarPos.left + 'px';
                    this.toolbarEl.style.top = this.toolbarPos.top + 'px';
                    this.toolbarEl.style.bottom = 'auto';
                    this.toolbarEl.style.transform = 'none';
                    // Iniciar timer para auto-colapsar de nuevo
                    this.startToolbarAutoCollapse();
                }

                /**
                 * Sincroniza la posición del botón minimizado con la última posición de la barra
                 */
                updateMiniBtnPosition() {
                    if (!this.miniToolbarBtn) return;
                    this.miniToolbarBtn.style.left = (this.toolbarPos.left + 8) + 'px';
                    this.miniToolbarBtn.style.top = (this.toolbarPos.top + 8) + 'px';
                    this.miniToolbarBtn.style.bottom = 'auto';
                    this.miniToolbarBtn.style.transform = 'none';
                }

                /**
                 * Inicia el temporizador para minimizar automáticamente la barra tras inactividad
                 */
                startToolbarAutoCollapse() {
                    this.cancelToolbarAutoCollapse();
                    this.toolbarAutoCollapseTimer = setTimeout(() => {
                        this.collapseToolbar();
                    }, 2500); // 2.5 segundos de inactividad
                }

                /**
                 * Cancela el temporizador de auto-colapso
                 */
                cancelToolbarAutoCollapse() {
                    if (this.toolbarAutoCollapseTimer) {
                        clearTimeout(this.toolbarAutoCollapseTimer);
                        this.toolbarAutoCollapseTimer = null;
                    }
                }

                // ==========================================
                // CAPA 8.21: CONFIGURACIÓN DE EVENTOS GLOBALES
                // ==========================================
                setupEventListeners() {
                    
                    const dropdownToggles = ['lapiz', 'resaltador', 'fuente', 'pizarra', 'guardar', 'pro'];
                    dropdownToggles.forEach(id => {
                        const btn = document.getElementById(`toggle-${id}`);
                        const drop = document.getElementById(`drop-${id}`);
                        if(btn && drop) {
                            btn.addEventListener('click', (e) => {
                                e.stopPropagation();
                                dropdownToggles.forEach(otherId => {
                                    if(otherId !== id) {
                                        const otherDrop = document.getElementById(`drop-${otherId}`);
                                        if(otherDrop) otherDrop.classList.add('hidden');
                                    }
                                });
                                // Cerrar paneles de formas al abrir un dropdown
                                ['lines-panel','shapes2d-panel','shapes3d-panel'].forEach(pid => {
                                    document.getElementById(pid).classList.add('hidden');
                                });
                                drop.classList.toggle('hidden');
                                
                                // Sincronizar hacia abajo
                                if (!drop.classList.contains('hidden')) {
                                    if (id === 'lapiz') this.setTool('draw');
                                    if (id === 'resaltador') this.setTool('highlighter');
                                    if (id === 'fuente') {
                                        document.querySelectorAll('.quick-tool-horizontal').forEach(b => b.classList.remove('tool-active'));
                                        const textBtn = document.getElementById('text-btn-float');
                                        if(textBtn) textBtn.classList.add('tool-active');
                                    }
                                }
                            });
                            drop.addEventListener('click', (e) => e.stopPropagation());
                        }
                    });
                    document.addEventListener('click', () => {
                        dropdownToggles.forEach(id => {
                            const drop = document.getElementById(`drop-${id}`);
                            if(drop) drop.classList.add('hidden');
                        });
                    });

                    document.getElementById('ctx-copy').onclick = (e) => { e.stopPropagation(); this.copySelected(); };
                    document.getElementById('ctx-paste').onclick = (e) => { e.stopPropagation(); this.copySelected(); setTimeout(() => this.pasteFromInternal(), 50); };
                    document.getElementById('ctx-cut').onclick = (e) => { e.stopPropagation(); this.copySelected(); this.deleteSelection(); };
                    document.getElementById('ctx-delete').onclick = (e) => { e.stopPropagation(); this.deleteSelection(); };

                    document.getElementById('ctx-group').onclick = (e) => {
                        e.stopPropagation();
                        const obj = this.canvas.getActiveObject();
                        if (obj && obj.type === 'activeSelection') {
                            obj.toGroup();
                            this.canvas.requestRenderAll();
                            this.saveStateToHistory();
                            this.hideContextMenu();
                        }
                    };

                    document.getElementById('ctx-ungroup').onclick = (e) => {
                        e.stopPropagation();
                        const obj = this.canvas.getActiveObject();
                        if (obj && obj.type === 'group') {
                            obj.toActiveSelection();
                            this.canvas.requestRenderAll();
                            this.saveStateToHistory();
                            this.hideContextMenu();
                        }
                    };

                    document.getElementById('ctx-add-text').onclick = (e) => {
                        e.stopPropagation();
                        const obj = this.canvas.getActiveObject();
                        if (obj) {
                            const center = obj.getCenterPoint();
                            const fontSize = parseInt(document.getElementById('font-size-select').value) || 24;
                            const fontFamily = document.getElementById('font-family-select').value || 'Arial';
                            const textColor = document.getElementById('text-color-btn').value || '#000000';
                            
                            const text = new fabric.IText('Texto Inicial', {
                                left: center.x, top: center.y,
                                originX: 'center', originY: 'center',
                                fontSize: fontSize, fontFamily: fontFamily, fill: textColor
                            });
                            
                            this.canvas.add(text);
                            this.canvas.setActiveObject(text);
                            text.enterEditing();
                            text.selectAll();
                            
                            this.canvas.requestRenderAll();
                            this.saveStateToHistory();
                            this.hideContextMenu();
                        }
                    };

                    document.getElementById('ctx-fill-cb').onchange = (e) => {
                        const isChecked = e.target.checked;
                        document.querySelectorAll('.fill-shape-cb').forEach(c => c.checked = isChecked);
                        const active = this.canvas.getActiveObject();
                        if (active) {
                            this.updateShapeColors(active);
                            this.canvas.renderAll();
                            this.saveStateToHistory();
                        }
                    };

                    const panels = ['lines-panel', 'shapes2d-panel', 'shapes3d-panel'];
                    const togglePanel = (targetId) => {
                        panels.forEach(id => {
                            if(id !== targetId) document.getElementById(id).classList.add('hidden');
                        });
                        // Cerrar todos los dropdowns al abrir un panel
                        ['lapiz','resaltador','fuente','pizarra','guardar','pro'].forEach(id => {
                            const d = document.getElementById('drop-'+id);
                            if(d) d.classList.add('hidden');
                        });
                        document.getElementById(targetId).classList.toggle('hidden');
                    };

                    document.querySelectorAll('.fill-shape-cb').forEach(cb => {
                        cb.onchange = (e) => {
                            const isChecked = e.target.checked;
                            document.querySelectorAll('.fill-shape-cb').forEach(c => c.checked = isChecked);
                            const active = this.canvas.getActiveObject();
                            if (active) {
                                this.updateShapeColors(active);
                                this.canvas.renderAll();
                                this.saveStateToHistory();
                            }
                        };
                    });

                    const updateTextProp = (prop, val) => {
                        const active = this.canvas.getActiveObject();
                        if (active && (active.type === 'i-text' || active.type === 'textbox' || active.isNote)) {
                            active.set(prop, val);
                            this.canvas.renderAll();
                            this.saveStateToHistory();
                        }
                    };

                    document.getElementById('font-family-select').onchange = (e) => updateTextProp('fontFamily', e.target.value);
                    document.getElementById('font-size-select').onchange = (e) => updateTextProp('fontSize', parseInt(e.target.value));

                    document.getElementById('text-bold-btn').onclick = () => {
                        const active = this.canvas.getActiveObject();
                        if (active && (active.type === 'i-text' || active.type === 'textbox' || active.isNote)) {
                            const isBold = active.fontWeight === 'bold';
                            active.set('fontWeight', isBold ? 'normal' : 'bold');
                            document.getElementById('text-bold-btn').classList.toggle('text-[#FF8C00]', !isBold);
                            this.canvas.renderAll();
                            this.saveStateToHistory();
                        }
                    };

                    document.getElementById('text-italic-btn').onclick = () => {
                        const active = this.canvas.getActiveObject();
                        if (active && (active.type === 'i-text' || active.type === 'textbox' || active.isNote)) {
                            const isItalic = active.fontStyle === 'italic';
                            active.set('fontStyle', isItalic ? 'normal' : 'italic');
                            document.getElementById('text-italic-btn').classList.toggle('text-[#FF8C00]', !isItalic);
                            this.canvas.renderAll();
                            this.saveStateToHistory();
                        }
                    };

                    document.getElementById('text-case-btn').onclick = () => {
                        const active = this.canvas.getActiveObject();
                        if (active && active.text) {
                            const txt = active.text;
                            const isUpper = txt === txt.toUpperCase();
                            active.set('text', isUpper ? txt.toLowerCase() : txt.toUpperCase());
                            this.canvas.renderAll();
                            this.saveStateToHistory();
                        }
                    };

                    document.getElementById('text-color-btn').onchange = (e) => updateTextProp('fill', e.target.value);
                    
                    document.getElementById('text-bg-btn').onchange = (e) => {
                        updateTextProp('backgroundColor', e.target.value);
                        const active = this.canvas.getActiveObject();
                        if (active && active.type !== 'i-text' && active.type !== 'textbox' && !active.isNote) {
                            this.updateShapeColors(active);
                            this.canvas.renderAll();
                            this.saveStateToHistory();
                        }
                    };

                    document.getElementById('sel-delete-btn').onclick = () => this.deleteSelection();
                    
                    document.addEventListener('keydown', (e) => {
                        if (document.activeElement && (document.activeElement.tagName === 'INPUT' || document.activeElement.tagName === 'TEXTAREA' || this.canvas.getActiveObject()?.isEditing)) return;
                        
                        if (e.key === 'Delete' || e.key === 'Backspace') {
                            e.preventDefault();
                            this.deleteSelection();
                        }
                        if (e.ctrlKey || e.metaKey) {
                            if (e.key.toLowerCase() === 'c') {
                                this.copySelected();
                            } else if (e.key.toLowerCase() === 'v') {
                                this.pasteFromInternal();
                            } else if (e.key.toLowerCase() === 'x') {
                                this.copySelected();
                                this.deleteSelection();
                            } else if (e.key.toLowerCase() === 'z') {
                                e.preventDefault();
                                this.undo();
                            } else if (e.key.toLowerCase() === 'y') {
                                e.preventDefault();
                                this.redo();
                            }
                        }
                        if (!e.ctrlKey && !e.metaKey) {
                            if (e.key.toLowerCase() === 'v') this.setTool('select');
                            if (e.key.toLowerCase() === 'p') this.setTool('draw');
                            if (e.key.toLowerCase() === 'e') this.setTool('eraser');
                            if (e.key.toLowerCase() === 't') this.addShape('text');
                            if (e.key.toLowerCase() === 'h') this.setTool('highlighter');
                        }
                    });

                    document.getElementById('undo-btn').onclick = () => this.undo();
                    document.getElementById('redo-btn').onclick = () => this.redo();
                    
                    document.getElementById('clear-btn').onclick = () => { 
                        let prevBg = this.canvas.backgroundColor; 
                        this.canvas.clear(); 
                        this.canvas.backgroundColor = prevBg || '#F8F9FA'; 
                        this.saveStateToHistory(); 
                        this.hideContextMenu();
                    };

                    document.getElementById('export-img-btn').onclick = () => {
                        const dataURL = this.canvas.toDataURL({ format: 'png', quality: 1 });
                        const link = document.createElement('a');
                        link.download = `Pizarra_${this.currentPageId}.png`;
                        link.href = dataURL;
                        link.click();
                        this.showToast('Imagen guardada exitosamente.');
                        document.getElementById('drop-guardar').classList.add('hidden'); 
                    };

                    document.getElementById('export-pdf-btn').onclick = async () => {
                        document.getElementById('drop-guardar').classList.add('hidden'); 
                        if (typeof window.jspdf === 'undefined') {
                            this.showToast('La librería PDF aún se está cargando. Intente en unos segundos.');
                            return;
                        }

                        const inputPage = prompt('Ingrese el número de la pizarra a exportar (ej: 1, 2). Deje en blanco para exportar TODAS:');
                        let pagesToExport = this.pages;
                        
                        if (inputPage && inputPage.trim() !== '') {
                            const pageNum = parseInt(inputPage.trim(), 10);
                            if (isNaN(pageNum) || pageNum < 1 || pageNum > this.pages.length) {
                                this.showToast('Número de página inválido.');
                                return;
                            }
                            pagesToExport = [this.pages[pageNum - 1]];
                        }

                        this.showToast('Generando documento PDF... Por favor espere.');
                        const { jsPDF } = window.jspdf;
                        
                        const pdf = new jsPDF('l', 'px', [this.canvas.width, this.canvas.height]);
                        const originalPageId = this.currentPageId;
                        this.saveCurrentPage(); 

                        for (let i = 0; i < pagesToExport.length; i++) {
                            const page = pagesToExport[i];
                            await new Promise(resolve => {
                                this.canvas.loadFromJSON(page.json, () => {
                                    this.canvas.renderAll();
                                    setTimeout(() => {
                                        const imgData = this.canvas.toDataURL({ format: 'jpeg', quality: 0.9 });
                                        if (i > 0) pdf.addPage([this.canvas.width, this.canvas.height], 'l');
                                        pdf.addImage(imgData, 'JPEG', 0, 0, this.canvas.width, this.canvas.height);
                                        resolve();
                                    }, 150); 
                                });
                            });
                        }
                        
                        pdf.save(pagesToExport.length === 1 ? `Pizarra_Pagina_${inputPage.trim()}.pdf` : 'Pizarras_Completas.pdf');
                        this.showToast('PDF generado exitosamente.');
                        this.loadPage(originalPageId); 
                    };

                    // ==========================================
                    // CAPA 9: COLABORACIÓN EN TIEMPO REAL (PeerJS)
                    // ==========================================
                    this.peer = null;
                    this.connections = [];
                    this.hostConn = null;
                    this.isHost = false;
                    this.roomId = null;
                    this._syncLock = false;
                    this._peerNames = {};
                    const MAX_PEERS = 50;
                    const statusEl = document.getElementById('peer-status');
                    const countEl = document.getElementById('peer-count');
                    const codeInput = document.getElementById('share-code');
                    const partList = document.getElementById('participants-list');
                    const self = this;

                    const genRoomCode = () => {
                        const c = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
                        let r = 'PIZ-';
                        for(let i=0;i<4;i++) r += c[Math.floor(Math.random()*c.length)];
                        return r;
                    };

                    const updateStatus = (msg) => { statusEl.innerHTML = msg; };

                    const updateCount = () => {
                        const n = self.isHost ? self.connections.length : (self.hostConn ? 1 : 0);
                        countEl.textContent = n + ' / ' + MAX_PEERS;
                    };

                    const renderParticipants = () => {
                        if (!self.isHost || self.connections.length === 0) {
                            partList.classList.add('hidden');
                            return;
                        }
                        partList.classList.remove('hidden');
                        partList.innerHTML = '';
                        self.connections.forEach((conn, idx) => {
                            const name = self._peerNames[conn.peer] || ('Participante ' + (idx + 1));
                            const row = document.createElement('div');
                            row.className = 'flex items-center justify-between bg-[#1A2436] border border-[#2a3a4e] rounded-lg px-3 py-2';
                            row.innerHTML = '<div class="flex items-center gap-2"><span class="w-2 h-2 rounded-full bg-green-400 inline-block"></span><span class="text-sm text-white truncate" style="max-width:200px">' + name + '</span></div>' +
                                '<button class="kick-btn px-2 py-1 text-xs bg-red-900 text-red-300 border border-red-800 rounded hover:bg-red-700 hover:text-white font-bold transition" data-peer="' + conn.peer + '"><i class="fas fa-user-slash mr-1"></i>Expulsar</button>';
                            partList.appendChild(row);
                        });
                        // Bind kick buttons
                        partList.querySelectorAll('.kick-btn').forEach(btn => {
                            btn.onclick = () => {
                                const peerId = btn.dataset.peer;
                                const conn = self.connections.find(c => c.peer === peerId);
                                if (conn) {
                                    try { conn.send({ type: 'kicked' }); } catch(e){}
                                    setTimeout(() => conn.close(), 200);
                                    self.connections = self.connections.filter(c => c !== conn);
                                    delete self._peerNames[peerId];
                                    renderParticipants();
                                    updateCount();
                                    updateStatus('<span class="text-green-400"><i class="fas fa-check-circle mr-1"></i> Sala activa — ' + self.connections.length + ' participante(s)</span>');
                                    self.showToast('Participante expulsado');
                                }
                            };
                        });
                    };

                    const broadcastToAll = (data) => {
                        self.connections.forEach(c => { try { c.send(data); } catch(e){} });
                    };

                    const sendCanvasState = (conn) => {
                        conn.send({ type: 'canvas-full', data: JSON.stringify(self.canvas.toJSON()) });
                    };

                    const handleIncomingData = (data, fromConn) => {
                        if (data.type === 'kicked') {
                            self.hostConn = null;
                            if (self.peer) self.peer.destroy();
                            self.peer = null;
                            updateStatus('<span class="text-red-400"><i class="fas fa-ban mr-1"></i> Fuiste expulsado de la sala por el anfitrión.</span>');
                            updateCount();
                            self.showToast('Fuiste expulsado de la sala');
                            return;
                        }
                        if (data.type === 'set-name' && self.isHost && fromConn) {
                            self._peerNames[fromConn.peer] = data.name;
                            renderParticipants();
                            return;
                        }
                        if (self._syncLock) return;
                        self._syncLock = true;

                        if (data.type === 'canvas-full') {
                            self.canvas.loadFromJSON(data.data, () => {
                                self.canvas.renderAll();
                                self._syncLock = false;
                            });
                        } else if (data.type === 'canvas-update') {
                            self.canvas.loadFromJSON(data.data, () => {
                                self.canvas.renderAll();
                                self._syncLock = false;
                                if (self.isHost) {
                                    self.connections.forEach(c => {
                                        if (c !== fromConn) { try { c.send(data); } catch(e){} }
                                    });
                                }
                            });
                        } else { self._syncLock = false; }
                    };

                    const setupCanvasSync = () => {
                        const sendUpdate = () => {
                            if (self._syncLock) return;
                            const msg = { type: 'canvas-update', data: JSON.stringify(self.canvas.toJSON()) };
                            if (self.isHost) broadcastToAll(msg);
                            else if (self.hostConn) { try { self.hostConn.send(msg); } catch(e){} }
                        };
                        self.canvas.on('object:added', sendUpdate);
                        self.canvas.on('object:modified', sendUpdate);
                        self.canvas.on('object:removed', sendUpdate);
                        self.canvas.on('path:created', sendUpdate);
                    };

                    // CREAR SALA
                    document.getElementById('create-room-btn').onclick = () => {
                        const code = genRoomCode();
                        self.roomId = code;
                        self.isHost = true;
                        codeInput.value = code;
                        updateStatus('<i class="fas fa-spinner fa-spin mr-1"></i> Conectando...');
                        self.peer = new Peer('pizarra-' + code, { debug: 0 });
                        self.peer.on('open', () => {
                            updateStatus('<span class="text-green-400"><i class="fas fa-check-circle mr-1"></i> Sala activa — Comparte el código: <strong>' + code + '</strong></span>');
                            self.showToast('Sala creada: ' + code);
                            setupCanvasSync();
                        });
                        self.peer.on('connection', (conn) => {
                            if (self.connections.length >= MAX_PEERS) { conn.close(); return; }
                            self.connections.push(conn);
                            conn.on('open', () => {
                                sendCanvasState(conn);
                                updateCount();
                                updateStatus('<span class="text-green-400"><i class="fas fa-check-circle mr-1"></i> Sala activa — ' + self.connections.length + ' participante(s)</span>');
                                renderParticipants();
                                self.showToast('Nuevo participante conectado');
                            });
                            conn.on('data', (data) => handleIncomingData(data, conn));
                            conn.on('close', () => {
                                self.connections = self.connections.filter(c => c !== conn);
                                delete self._peerNames[conn.peer];
                                updateCount();
                                renderParticipants();
                                updateStatus('<span class="text-green-400"><i class="fas fa-check-circle mr-1"></i> Sala activa — ' + self.connections.length + ' participante(s)</span>');
                            });
                        });
                        self.peer.on('error', (err) => {
                            updateStatus('<span class="text-red-400"><i class="fas fa-exclamation-circle mr-1"></i> Error: ' + (err.type === 'unavailable-id' ? 'Código en uso, intenta de nuevo' : err.type) + '</span>');
                        });
                    };

                    // UNIRSE A SALA
                    document.getElementById('join-room-btn').onclick = () => {
                        const code = document.getElementById('join-code-input').value.trim().toUpperCase();
                        const name = document.getElementById('join-name-input').value.trim() || 'Anónimo';
                        if (!code || code.length < 4) { self.showToast('Ingresa un código válido'); return; }
                        updateStatus('<i class="fas fa-spinner fa-spin mr-1"></i> Conectando a ' + code + '...');
                        self.peer = new Peer(undefined, { debug: 0 });
                        self.peer.on('open', () => {
                            const conn = self.peer.connect('pizarra-' + code, { reliable: true });
                            conn.on('open', () => {
                                self.hostConn = conn;
                                self.isHost = false;
                                conn.send({ type: 'set-name', name: name });
                                updateStatus('<span class="text-green-400"><i class="fas fa-check-circle mr-1"></i> Conectado como <strong>' + name + '</strong> a sala <strong>' + code + '</strong></span>');
                                updateCount();
                                self.showToast('Conectado a sala ' + code);
                                setupCanvasSync();
                            });
                            conn.on('data', (data) => handleIncomingData(data, null));
                            conn.on('close', () => {
                                self.hostConn = null;
                                updateStatus('<span class="text-red-400"><i class="fas fa-times-circle mr-1"></i> Desconectado</span>');
                                updateCount();
                            });
                        });
                        self.peer.on('error', () => {
                            updateStatus('<span class="text-red-400"><i class="fas fa-exclamation-circle mr-1"></i> Sala no encontrada</span>');
                        });
                    };

                    document.getElementById('share-btn').onclick = () => document.getElementById('modal-share').classList.remove('hidden');
                    document.getElementById('close-share').onclick = () => document.getElementById('modal-share').classList.add('hidden');
                    document.getElementById('copy-share-btn').onclick = () => {
                        const code = codeInput.value;
                        if (code) { navigator.clipboard.writeText(code); self.showToast('Código copiado: ' + code); }
                    };
                    
                    document.getElementById('web-viewer-btn').onclick = () => {
                        document.getElementById('drop-pro').classList.add('hidden'); 
                        if (!navigator.onLine) {
                            this.showToast('Acceso denegado: El Visor Web requiere conexión a Internet.');
                            return;
                        }
                        const webViewer = document.getElementById('web-viewer');
                        const webBtn = document.getElementById('web-viewer-btn');
                        
                        webViewer.classList.remove('hidden');
                        document.getElementById('doc-viewer').classList.add('hidden');
                        
                        webBtn.classList.add('bg-[#FF8C00]', 'text-[#0A1420]', 'border-[#FF8C00]');
                        webBtn.classList.remove('bg-[#1A2436]', 'text-gray-300', 'border-[#2a3a4e]');
                    };
                    
                    document.getElementById('close-web-viewer').onclick = () => {
                        document.getElementById('web-viewer').classList.add('hidden');
                        
                        const webBtn = document.getElementById('web-viewer-btn');
                        webBtn.classList.remove('bg-[#FF8C00]', 'text-[#0A1420]', 'border-[#FF8C00]');
                        webBtn.classList.add('bg-[#1A2436]', 'text-gray-300', 'border-[#2a3a4e]');
                    };
                    
                    document.getElementById('close-viewer').onclick = () => document.getElementById('doc-viewer').classList.add('hidden');

                    document.getElementById('panel-lines-btn').onclick = () => togglePanel('lines-panel');
                    document.getElementById('panel-shapes2d-btn').onclick = () => togglePanel('shapes2d-panel');
                    document.getElementById('panel-shapes3d-btn').onclick = () => togglePanel('shapes3d-panel');
                    
                    document.querySelectorAll('.close-panel-btn').forEach(btn => {
                        btn.onclick = () => btn.parentElement.parentElement.classList.add('hidden');
                    });
                    
                    document.querySelectorAll('.add-shape-btn').forEach(btn => {
                        btn.onclick = () => {
                            this.addShape(btn.getAttribute('data-shape'));
                            btn.parentElement.parentElement.classList.add('hidden');
                        };
                    });

                    document.getElementById('brush-size-num').onchange = (e) => { 
                        this.brushConfig.width = parseInt(e.target.value, 10); 
                        if(this.currentTool === 'draw') this.updateBrushFromConfig(); 
                    };
                    document.getElementById('highlighter-size-num').onchange = (e) => { 
                        this.highlighterConfig.width = parseInt(e.target.value, 10); 
                        if(this.currentTool === 'highlighter') this.updateBrushFromConfig(); 
                    };

                    document.getElementById('brush-color').onchange = (e) => { 
                        this.brushConfig.color = e.target.value; 
                        this.updateBrushFromConfig(); 
                        const active = this.canvas.getActiveObject();
                        if (active) {
                            this.updateShapeColors(active);
                            this.canvas.renderAll();
                            this.saveStateToHistory();
                        }
                        document.getElementById('drop-lapiz').classList.add('hidden');
                    };
                    
                    document.querySelectorAll('.color-quick').forEach(btn => {
                        btn.onclick = () => {
                            const color = btn.getAttribute('data-color');
                            document.getElementById('brush-color').value = color;
                            this.brushConfig.color = color;
                            this.updateBrushFromConfig();
                            
                            const active = this.canvas.getActiveObject();
                            if(active) {
                                if (active.type === 'i-text' || active.type === 'textbox') {
                                    active.set('fill', color);
                                } else {
                                    this.updateShapeColors(active);
                                }
                                this.canvas.renderAll(); 
                                this.saveStateToHistory();
                            }
                            document.getElementById('drop-lapiz').classList.add('hidden');
                        };
                    });
                    
                    document.querySelectorAll('.h-color-quick').forEach(btn => {
                        btn.onclick = () => {
                            this.highlighterConfig.color = btn.getAttribute('data-hcolor');
                            if(this.currentTool !== 'highlighter') this.setTool('highlighter');
                            else this.updateBrushFromConfig();
                            document.getElementById('drop-resaltador').classList.add('hidden');
                        };
                    });

                    const tools = ['select', 'draw', 'highlighter', 'eraser', 'pan'];
                    tools.forEach(tool => { 
                        const btn = document.getElementById(`${tool}-btn-float`);
                        if(btn) {
                            btn.onclick = (e) => {
                                e.stopPropagation();
                                this.setTool(tool);
                                
                                const allDrops = ['lapiz', 'resaltador', 'fuente', 'pizarra', 'guardar', 'pro'];
                                let target = null;
                                if(tool === 'draw') target = 'lapiz';
                                if(tool === 'highlighter') target = 'resaltador';
                                
                                // Cerrar paneles de formas
                                ['lines-panel','shapes2d-panel','shapes3d-panel'].forEach(pid => {
                                    document.getElementById(pid).classList.add('hidden');
                                });
                                
                                allDrops.forEach(id => {
                                    const drop = document.getElementById(`drop-${id}`);
                                    if(drop) {
                                        if(id === target) drop.classList.toggle('hidden');
                                        else drop.classList.add('hidden');
                                    }
                                });
                            };
                        }
                    });
                    
                    // StopPropagation en dropdowns para que no se cierren al hacer clic dentro
                    ['lapiz','resaltador','fuente','pizarra','guardar','pro'].forEach(id => {
                        const drop = document.getElementById('drop-'+id);
                        if(drop) drop.addEventListener('click', (e) => e.stopPropagation());
                    });
                    
                    const shapes = ['text', 'sticky'];
                    shapes.forEach(shape => { 
                        const btn = document.getElementById(`${shape}-btn-float`);
                        if(btn) {
                            btn.onclick = (e) => {
                                e.stopPropagation();
                                this.addShape(shape); 
                                
                                if(shape === 'text') {
                                    document.querySelectorAll('.quick-tool-horizontal').forEach(b => b.classList.remove('tool-active'));
                                    btn.classList.add('tool-active');
                                    
                                    const dropdownToggles = ['lapiz', 'resaltador', 'fuente', 'pizarra', 'guardar', 'pro'];
                                    dropdownToggles.forEach(id => {
                                        const drop = document.getElementById(`drop-${id}`);
                                        if(drop) {
                                            if(id === 'fuente') drop.classList.remove('hidden');
                                            else drop.classList.add('hidden');
                                        }
                                    });
                                }
                            };
                        }
                    });
                    
                    document.getElementById('bg-white').onclick = () => { 
                        this.canvas.backgroundColor = '#F8F9FA'; 
                        if(this.brushConfig.color.toLowerCase() === '#ffffff' || this.brushConfig.color.toLowerCase() === '#f8f9fa') {
                            this.brushConfig.color = '#000000';
                            document.getElementById('brush-color').value = '#000000';
                            if(this.currentTool === 'draw') this.updateBrushFromConfig();
                        }
                        this.canvas.renderAll(); 
                        if(this.currentTool === 'eraser') this.updateBrushFromConfig(); 
                        document.getElementById('drop-pizarra').classList.add('hidden');
                    };
                    
                    document.getElementById('bg-black').onclick = () => { 
                        this.canvas.backgroundColor = '#000000'; 
                        if(this.brushConfig.color === '#000000') {
                            this.brushConfig.color = '#ffffff';
                            document.getElementById('brush-color').value = '#ffffff';
                            if(this.currentTool === 'draw') this.updateBrushFromConfig();
                        }
                        this.canvas.renderAll(); 
                        if(this.currentTool === 'eraser') this.updateBrushFromConfig(); 
                        document.getElementById('drop-pizarra').classList.add('hidden');
                    };

                    document.getElementById('bg-green').onclick = () => { 
                        this.canvas.backgroundColor = '#064E3B'; 
                        if(this.brushConfig.color === '#064E3B' || this.brushConfig.color === '#000000') {
                            this.brushConfig.color = '#ffffff';
                            document.getElementById('brush-color').value = '#ffffff';
                            if(this.currentTool === 'draw') this.updateBrushFromConfig();
                        }
                        this.canvas.renderAll(); 
                        if(this.currentTool === 'eraser') this.updateBrushFromConfig(); 
                        document.getElementById('drop-pizarra').classList.add('hidden');
                    };

                    // Botón de líneas guía — ajustable, punteadas, color suave
                    let gridLines = [];
                    const gridBtn = document.getElementById('grid-btn');
                    const gridSpacing = document.getElementById('grid-spacing');
                    const gridSpacingVal = document.getElementById('grid-spacing-val');
                    const dropGrid = document.getElementById('drop-grid');

                    const drawGrid = (spacing) => {
                        // Eliminar guías anteriores
                        gridLines.forEach(l => this.canvas.remove(l));
                        gridLines = [];
                        const w = this.canvas.getWidth();
                        const h = this.canvas.getHeight();
                        // Crear patrón de puntos como fondo (rendimiento óptimo)
                        const patCanvas = document.createElement('canvas');
                        patCanvas.width = spacing;
                        patCanvas.height = spacing;
                        const pCtx = patCanvas.getContext('2d');
                        pCtx.fillStyle = this.canvas.backgroundColor || '#F8F9FA';
                        pCtx.fillRect(0, 0, spacing, spacing);
                        pCtx.fillStyle = 'rgba(160, 170, 190, 0.5)';
                        pCtx.beginPath();
                        pCtx.arc(1, 1, 1.3, 0, Math.PI * 2);
                        pCtx.fill();
                        this._savedBg = this.canvas.backgroundColor;
                        this.canvas.setBackgroundColor(new fabric.Pattern({ source: patCanvas, repeat: 'repeat' }), () => this.canvas.renderAll());
                        this.canvas.renderAll();
                        gridBtn.classList.add('tool-active');
                    };

                    const clearGrid = () => {
                        gridLines.forEach(l => this.canvas.remove(l));
                        gridLines = [];
                        this.canvas.setBackgroundColor(this._savedBg || '#F8F9FA', () => this.canvas.renderAll());
                        gridBtn.classList.remove('tool-active');
                    };

                    gridBtn.onclick = (e) => {
                        e.stopPropagation();
                        // Cerrar otros dropdowns
                        ['lapiz','resaltador','fuente','pizarra','guardar','pro'].forEach(id => {
                            const d = document.getElementById('drop-'+id);
                            if(d) d.classList.add('hidden');
                        });
                        ['lines-panel','shapes2d-panel','shapes3d-panel'].forEach(pid => {
                            document.getElementById(pid).classList.add('hidden');
                        });
                        dropGrid.classList.toggle('hidden');
                    };
                    dropGrid.addEventListener('click', (e) => e.stopPropagation());

                    gridSpacing.oninput = () => {
                        gridSpacingVal.textContent = gridSpacing.value;
                        if (gridLines.length > 0) drawGrid(parseInt(gridSpacing.value));
                    };

                    document.getElementById('grid-on-btn').onclick = () => {
                        drawGrid(parseInt(gridSpacing.value));
                        dropGrid.classList.add('hidden');
                    };

                    document.getElementById('grid-off-btn').onclick = () => {
                        clearGrid();
                        dropGrid.classList.add('hidden');
                    };

                    // Cerrar dropdown grid al clic fuera
                    document.addEventListener('click', () => dropGrid.classList.add('hidden'));
                    
                    document.getElementById('new-page-bottom').onclick = () => this.createPage();
                    
                    // Pantalla completa
                    document.getElementById('fullscreen-btn').onclick = () => {
                        if (typeof screenfull !== 'undefined' && screenfull.isEnabled) {
                            screenfull.toggle();
                        } else if (document.documentElement.requestFullscreen) {
                            if (document.fullscreenElement) document.exitFullscreen();
                            else document.documentElement.requestFullscreen();
                        }
                    };

                    document.getElementById('calculator-btn').onclick = () => {
                        document.getElementById('modal-calc').classList.remove('hidden');
                        document.getElementById('drop-pro').classList.add('hidden');
                    };
                    document.getElementById('close-calc').onclick = () => document.getElementById('modal-calc').classList.add('hidden');

                    let mRec, chunks=[], activeStreams=[];
                    document.getElementById('record-btn').onclick = async function() {
                        document.getElementById('drop-pro').classList.add('hidden');
                        if(!this.classList.contains('bg-red-700')){
                            try { 
                                const dispStream = await navigator.mediaDevices.getDisplayMedia({ video: { preferCurrentTab: true, displaySurface: "browser" }, audio: true });
                                
                                let micStream;
                                try { micStream = await navigator.mediaDevices.getUserMedia({ audio: true }); } catch(e){}
                                
                                const actx = new (window.AudioContext || window.webkitAudioContext)();
                                const dest = actx.createMediaStreamDestination();
                                if(dispStream.getAudioTracks().length > 0) actx.createMediaStreamSource(dispStream).connect(dest);
                                if(micStream && micStream.getAudioTracks().length > 0) actx.createMediaStreamSource(micStream).connect(dest);
                                
                                const tracks = [...dispStream.getVideoTracks()];
                                if(dest.stream.getAudioTracks().length > 0) tracks.push(dest.stream.getAudioTracks()[0]);
                                
                                const finalStream = new MediaStream(tracks);
                                activeStreams = [dispStream, micStream];
                                
                                mRec = new MediaRecorder(finalStream);
                                mRec.ondataavailable = e => { if(e.data.size>0) chunks.push(e.data); };
                                mRec.onstop = () => { 
                                    const a = document.createElement('a'); 
                                    a.href = URL.createObjectURL(new Blob(chunks, {type:'video/webm'})); 
                                    a.download = 'Clase_Pizarra.webm'; 
                                    a.click(); 
                                    chunks = []; 
                                    activeStreams.forEach(s => s && s.getTracks().forEach(t => t.stop()));
                                };
                                mRec.start(); 
                                this.classList.add('bg-red-700', 'text-white');
                                this.classList.remove('text-red-400');
                                this.innerHTML = '<i class="fas fa-stop w-5 text-center"></i> Detener Grabación'; 
                            } catch(err){ 
                                alert("Permiso de grabación cancelado o denegado."); 
                            }
                        } else { 
                            mRec.stop(); 
                            this.classList.remove('bg-red-700', 'text-white'); 
                            this.classList.add('text-red-400');
                            this.innerHTML = '<i class="fas fa-record-vinyl w-5 text-center"></i> Grabar Clase'; 
                        }
                    }
                }
            }
            window.addEventListener('DOMContentLoaded', () => { window.pizarraInstance = new PizarraProPlus(); });
        })();
    </script>
<script>if("serviceWorker" in navigator){navigator.serviceWorker.register("./sw.js").catch(()=>{})}</script>
